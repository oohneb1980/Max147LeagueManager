// ── STANDINGS ─────────────────────────────────────────────
function computeStandings() {
  const {format,pointsWin,pointsDraw,pointsLose}=APP.config;
  const entities=format==='individual'?APP.players:APP.teams;
  const map={};
  entities.forEach(e=>{map[e.id]={id:e.id,name:e.name,p:0,w:0,d:0,l:0,fw:0,fl:0,hb:0,pts:0};});
  APP.matches.filter(m=>m.status==='completed').forEach(m=>{
    const a=map[m.entityA],b=map[m.entityB];
    if(!a||!b)return;
    a.p++;b.p++;
    a.fw+=m.scoreA;a.fl+=m.scoreB;b.fw+=m.scoreB;b.fl+=m.scoreA;
    if((m.highBreakA||0)>a.hb)a.hb=m.highBreakA;
    if((m.highBreakB||0)>b.hb)b.hb=m.highBreakB;
    if(m.scoreA>m.scoreB){a.w++;b.l++;a.pts+=pointsWin;b.pts+=pointsLose;}
    else if(m.scoreA<m.scoreB){b.w++;a.l++;b.pts+=pointsWin;a.pts+=pointsLose;}
    else{a.d++;b.d++;a.pts+=pointsDraw;b.pts+=pointsDraw;}
  });
  return Object.values(map);
}

function computePlayerStats() {
  const {pointsWin,pointsDraw,pointsLose}=APP.config;
  const map={};
  APP.players.forEach(p=>{map[p.id]={id:p.id,name:p.name,team:getTeamOf(p.id),p:0,w:0,d:0,l:0,fw:0,fl:0,hb:0,pts:0};});
  APP.matches.filter(m=>m.status==='completed').forEach(m=>{
    if(APP.config.format==='individual'){
      const a=map[m.entityA],b=map[m.entityB];
      if(a){a.p++;a.fw+=m.scoreA;a.fl+=m.scoreB;if((m.highBreakA||0)>a.hb)a.hb=m.highBreakA;
        if(m.scoreA>m.scoreB){a.w++;a.pts+=pointsWin;}else if(m.scoreA<m.scoreB){a.l++;a.pts+=pointsLose;}else{a.d++;a.pts+=pointsDraw;}}
      if(b){b.p++;b.fw+=m.scoreB;b.fl+=m.scoreA;if((m.highBreakB||0)>b.hb)b.hb=m.highBreakB;
        if(m.scoreB>m.scoreA){b.w++;b.pts+=pointsWin;}else if(m.scoreB<m.scoreA){b.l++;b.pts+=pointsLose;}else{b.d++;b.pts+=pointsDraw;}}
    } else {
      (m.frameDetails||[]).forEach(f=>{
        if(f.playerA&&map[f.playerA]){const pl=map[f.playerA];pl.p++;if(f.winnerA){pl.w++;pl.fw++;pl.pts+=pointsWin;}else{pl.l++;pl.fl++;pl.pts+=pointsLose;}if((f.breakA||0)>pl.hb)pl.hb=f.breakA;}
        if(f.playerB&&map[f.playerB]){const pl=map[f.playerB];pl.p++;if(!f.winnerA){pl.w++;pl.fw++;pl.pts+=pointsWin;}else{pl.l++;pl.fl++;pl.pts+=pointsLose;}if((f.breakB||0)>pl.hb)pl.hb=f.breakB;}
      });
    }
  });
  return Object.values(map);
}

function sortRows(rows) {
  const col=APP.sortCol,dir=APP.sortDir;
  return [...rows].sort((a,b)=>{
    let v=col==='fd'?((a.fw-a.fl)-(b.fw-b.fl)):((a[col]||0)-(b[col]||0));
    if(v===0)v=(a.fw-a.fl)-(b.fw-b.fl);
    if(v===0)v=a.name.localeCompare(b.name);
    return v*dir;
  });
}

function generateRoundRobin() {
  const isTeam=APP.config.format==='team';
  const pool=isTeam?[...APP.teams]:[...APP.players];
  if(pool.length<2)return[];
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  const n=pool.length%2===0?pool.length:pool.length+1;
  const rotating=pool.slice(1);
  const rounds=[];
  for(let r=0;r<n-1;r++){
    const rp=[pool[0],...rotating];
    const pairs=[];
    for(let i=0;i<n/2;i++){const a=rp[i],b=rp[n-1-i];if(a&&b)pairs.push({entityA:a.id,entityB:b.id});}
    rounds.push({round:r+1,pairs});
    rotating.push(rotating.shift());
  }
  return rounds;
}

// ── RENDER ────────────────────────────────────────────────
function render() {
  const main = document.getElementById('main');

  // Hub-level nav visibility
  const hubNav = document.getElementById('hub-nav');
  if (hubNav) {
    hubNav.style.display = (APP.view==='hub'||APP.view==='users') ? 'flex' : 'none';
    const unBtn = document.getElementById('hnb-users');
    if (unBtn) unBtn.style.display = isSuperAdmin() ? 'flex' : 'none';
    document.getElementById('hnb-competitions')?.classList.toggle('active', APP.view==='hub');
    document.getElementById('hnb-users')?.classList.toggle('active', APP.view==='users');
  }

  if (APP.view==='hub')   { main.innerHTML=renderHub();            return; }
  if (APP.view==='users') { main.innerHTML=renderUserManagement(); return; }

  // ── Per-tab access matrix ──────────────────────────────
  // Always update tab visibility on every render so sign-in/out is reflected
  const ct          = APP.config.competitionType||'league';
  const isKnockout  = ct==='single_elim'||ct==='double_elim';
  const isGroupStage= ct==='group_stage';
  const lid         = APP.activeLeagueId;

  // While auth is still loading, show only public tabs to avoid flicker
  // hiding tabs that should be visible once auth resolves
  if (APP.auth.loading) {
    ['nb-fixtures','bnb-fixtures','nb-participants','bnb-participants','nb-config','bnb-config']
      .forEach(id => { const el=document.getElementById(id); if(el) el.style.display='none'; });
    main.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--ink-3)">
      <div class="auth-loading-spinner" style="margin:0 auto 16px"></div>
      <div style="font-size:13px">Loading…</div>
    </div>`;
    return;
  }

  // Recompute after auth is confirmed loaded
  // Group stage: fixtures tab shows group matches + setup (not hidden like KO)
  const canSeeFix    = isLoggedIn() && (isGroupStage || !isKnockout) && (isLeagueMember(lid) || canEditCompetition(lid));
  const canSeeManage = canEditCompetition(lid); // true for super_admin and owners

  // Sync nav tab visibility
  [['nb-fixtures',     'bnb-fixtures',    canSeeFix   ],
   ['nb-participants', 'bnb-participants', canSeeManage],
   ['nb-config',       'bnb-config',      canSeeManage],
  ].forEach(([did, mid, show]) => {
    const d = document.getElementById(did), m = document.getElementById(mid);
    if (d) d.style.display = show ? 'flex' : 'none';
    if (m) m.style.display = show ? 'flex' : 'none';
  });

  // ── Redirect if current tab is no longer accessible ────
  const tabAccess = {
    dashboard: true,
    breaks:    true,
    fixtures:  canSeeFix,
    participants: canSeeManage,
    config:    canSeeManage,
  };
  if (!tabAccess[APP.tab]) {
    APP.tab = 'dashboard';
    // Sync nav active state
    document.querySelectorAll('.nav-btn,.bnav-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('nb-dashboard')?.classList.add('active');
    document.getElementById('bnb-dashboard')?.classList.add('active');
  }

  // ── Render content ─────────────────────────────────────
  if (APP.tab==='dashboard') {
    if (isKnockout)        main.innerHTML=renderBracket();
    else if (isGroupStage) main.innerHTML=renderGroupStandings();  // group standings only
    else                   main.innerHTML=renderDashboard();
    if (isKnockout) requestAnimationFrame(()=>drawBracketLines());
    return;
  }

  if (APP.tab==='breaks') { main.innerHTML=renderHighBreaks(); return; }

  // Fixtures tab:
  //   league/KO → standard fixture list (members only)
  //   group stage → group matches + setup groups + knockout bracket (members only)
  if (APP.tab==='fixtures') {
    if (!isLoggedIn()) {
      main.innerHTML = renderSignInPrompt(
        isGroupStage ? 'Sign in to view group fixtures' : 'Sign in to view fixtures',
        'Players and competition owners can view fixtures and enter match scores.',
        '📅'
      );
    } else if (!canSeeFix) {
      main.innerHTML = renderAccessDenied('You need to be enrolled in this competition to view fixtures.');
    } else if (isGroupStage) {
      main.innerHTML = renderGroupFixtures();  // group matches + setup + knockout
      requestAnimationFrame(()=>drawBracketLines());
    } else {
      main.innerHTML = renderFixtures();
    }
    return;
  }

  // Participants — owners only
  if (APP.tab==='participants') {
    if (!isLoggedIn()) {
      main.innerHTML = renderSignInPrompt(
        'Sign in to manage participants',
        'Competition owners can manage players, teams, and rosters.',
        '👥'
      );
    } else if (!canSeeManage) {
      main.innerHTML = renderAccessDenied("You need to be this competition's owner to manage participants.");
    } else {
      main.innerHTML = renderParticipants();
    }
    return;
  }

  // Config — owners only
  if (APP.tab==='config') {
    if (!isLoggedIn()) {
      main.innerHTML = renderSignInPrompt(
        'Sign in to access settings',
        'Competition owners can configure points, format, and competition settings.',
        '⚙️'
      );
    } else if (!canSeeManage) {
      main.innerHTML = renderAccessDenied("You need to be this competition's owner to change settings.");
    } else {
      main.innerHTML = renderConfig();
    }
    return;
  }
}

function leagueStats(lg) {
  const ct = lg.competitionType||'league';
  if (ct === 'group_stage') {
    const gseed = (typeof GROUP_SEED!=='undefined'&&GROUP_SEED[lg.id]) ? GROUP_SEED[lg.id] : {players:[],groupMatches:[]}; const _gseed=gseed; const gseed2 = _gseed||{players:[],groupMatches:[]};
    const gms = gseed.groupMatches||[];
    const completed = gms.filter(m=>m.status==='completed').length;
    const remaining = gms.filter(m=>m.status!=='completed').length;
    return {participants: gseed.players.length, matches: gms.length, completed, remaining};
  }
  if (ct !== 'league') {
    const bseed = BRACKET_SEED[lg.id]||{players:[],bracketMatches:[]};
    const bms = bseed.bracketMatches||[];
    const completed = bms.filter(m=>m.status==='completed').length;
    const remaining = bms.filter(m=>m.status!=='completed'&&m.entityA!=='TBD'&&m.entityB!=='TBD').length;
    return {participants: bseed.players.length, matches: bms.length, completed, remaining};
  }
  const seed=SEED[lg.id]||{players:[],teams:[],matches:[]};
  const ents=lg.format==='individual'?seed.players:seed.teams;
  const completed=seed.matches.filter(m=>m.status==='completed').length;
  return {participants:ents.length, matches:seed.matches.length, completed, remaining: seed.matches.length-completed};
}

// In-memory cache of all users (loaded when page opens)
let _allUsers = [];
let _usersLoading = false;

async function loadAllUsers(force=false) {
  if (_usersLoading) return;
  if (_allUsers.length && !force) { render(); return; }
  _usersLoading = true;
  if (!db) { _usersLoading=false; render(); return; }
  try {
    const snap = await db.collection('users').orderBy('createdAt','desc').get({ source:'server' });
    _allUsers = snap.docs.map(d => ({ id:d.id, ...d.data() }));
  } catch(e) {
    console.error('loadAllUsers error', e);
    _allUsers = [];
  }
  _usersLoading = false;
  render();
}

// ── LAST SUPER ADMIN GUARD ────────────────────────────────
// Returns true (and shows a toast) if the change would remove the last super admin
function wouldRemoveLastSuperAdmin(uid, newRole) {
  if (newRole === 'super_admin') return false; // promoting, not demoting
  const currentUser = _allUsers.find(u => u.id === uid);
  if (!currentUser || currentUser.role !== 'super_admin') return false; // not a super admin
  const superAdminCount = _allUsers.filter(u => u.role === 'super_admin').length;
  if (superAdminCount <= 1) {
    openModal('Action not allowed',
      `<div class="alert alert-err" style="margin-bottom:14px">
        <strong>${currentUser.displayName||currentUser.email}</strong> is the only Super Admin.
        You cannot change their role — there must always be at least one Super Admin in the system.
      </div>
      <div style="font-size:13px;color:var(--ink-2);line-height:1.6">
        To proceed, first promote another user to Super Admin, then come back and change this user's role.
      </div>`,
      `<button class="btn btn-primary" onclick="closeModal()">OK, understood</button>`
    );
    return true;
  }
  return false;
}

function setEditRole(role, el) {
  const uid = el.closest('[data-uid]')?.dataset.uid
    || document.getElementById('eu-uid')?.value;

  // Guard: prevent removing the last super admin via the toggle
  if (uid && wouldRemoveLastSuperAdmin(uid, role)) {
    // Revert the toggle visual back to super_admin
    el.closest('.toggle-group').querySelectorAll('.tog').forEach(t => t.classList.remove('on'));
    const saToggle = [...el.closest('.toggle-group').querySelectorAll('.tog')]
      .find(t => t.dataset.role === 'super_admin');
    if (saToggle) saToggle.classList.add('on');
    return;
  }

  document.getElementById('eu-role').value = role;
  el.closest('.toggle-group').querySelectorAll('.tog').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
}

async function saveEditUser(uid) {
  const name = document.getElementById('eu-name').value.trim();
  // System roles: 'super_admin' or 'player' (membership-based ownership replaces 'competition_owner')
  const role = document.getElementById('eu-role').value;
  const isSelf = uid === APP.auth.uid;

  if (!name) { toast('Name is required'); return; }
  if (!db)   { toast('Firebase not connected'); return; }

  // Guard: cannot remove the last super admin (applies to self too)
  if (wouldRemoveLastSuperAdmin(uid, role)) return;

  try {
    const updates = { displayName: name, updatedAt: new Date().toISOString() };
    // Role can now change for anyone (including self) — guard above handles safety
    updates.role = role;

    await db.collection('users').doc(uid).update(updates);

    // Update local cache
    const idx = _allUsers.findIndex(u => u.id === uid);
    if (idx > -1) Object.assign(_allUsers[idx], updates);

    // If editing self, update APP.auth live
    if (isSelf) {
      APP.auth.displayName = name;
      APP.auth.role = role;
      updateAuthChrome();
    }

    closeModal();
    toast('User updated ✓');
    render();
  } catch(e) {
    toast('Update failed: ' + (e.message||e.code));
  }
}

async function changeUserRole(uid, role) {
  if (!isSuperAdmin() || !db) return;

  // Guard: cannot remove the last super admin
  if (wouldRemoveLastSuperAdmin(uid, role)) {
    // Revert the select back to super_admin
    const sel = document.querySelector(`select[data-uid="${uid}"]`)
      || [...document.querySelectorAll('select')].find(s => s.dataset.uid === uid);
    if (sel) sel.value = 'super_admin';
    return;
  }

  try {
    await db.collection('users').doc(uid).update({ role });
    // Update local cache so subsequent checks are accurate
    const idx = _allUsers.findIndex(u => u.id === uid);
    if (idx > -1) _allUsers[idx].role = role;
    toast(`Role updated to ${role} ✓`);
  } catch(e) { toast('Failed: ' + e.message); }
}

        ? `<select style="font-size:12px;padding:4px 6px" id="mem-role-${lg.id}" onchange="updateMembership('${uid}','${lg.id}',this.value)">
            <option value="player"  ${memRole==='player'?'selected':''}>Player</option>
            <option value="owner"   ${memRole==='owner'?'selected':''}>Owner</option>
          </select>
          <button class="btn btn-danger btn-xs" onclick="removeMembership('${uid}','${lg.id}')">Remove</button>`
        : `<button class="btn btn-ghost btn-xs" onclick="addMembership('${uid}','${lg.id}')">+ Add</button>`
      }
    </div>`;
  }).join('');

  document.getElementById('modal-body').innerHTML = `
    <div style="font-size:12px;color:var(--ink-2);margin-bottom:14px">
      Manage which competitions this user can access and their role within each.
    </div>
    <div id="mem-rows">${rows || '<div style="color:var(--ink-3);font-size:13px">No competitions yet.</div>'}</div>`;

  document.getElementById('modal-ft').innerHTML =
    `<button class="btn btn-ghost" onclick="closeModal()">Done</button>`;

  // Store memberships ref for update functions
  window._editingMemberships = { uid, memberships };
}

async function addMembership(uid, leagueId) {
  if (!db) return;
  try {
    const u = _allUsers.find(x=>x.id===uid);
    const data = { uid, role:'player', displayName: u?.displayName||'', email: u?.email||'' };
    await db.collection('leagues').doc(leagueId).collection('members').doc(uid).set(data);
    toast('Added to competition ✓');
    await openManageMemberships(uid);
    loadAllUsers(true);
  } catch(e) { toast('Failed: ' + e.message); }
}

async function removeMembership(uid, leagueId) {
  if (!confirm('Remove this user from the competition?')) return;
  if (!db) return;
  try {
    await db.collection('leagues').doc(leagueId).collection('members').doc(uid).delete();
    toast('Removed from competition ✓');
    await openManageMemberships(uid);
    loadAllUsers(true);
  } catch(e) { toast('Failed: ' + e.message); }
}

async function updateMembership(uid, leagueId, role) {
  if (!db) return;
  try {
    await db.collection('leagues').doc(leagueId).collection('members').doc(uid).update({ role });
    toast('Role updated ✓');
  } catch(e) { toast('Failed: ' + e.message); }
}

function confirmDeleteUser(uid) {
  const u = _allUsers.find(x=>x.id===uid);
  if (!u) return;

  openModal('Remove user',
    `<div class="alert alert-warn" style="margin-bottom:16px">
      This removes the user's profile and all their competition memberships from Firestore.
      It does <strong>not</strong> delete their Firebase Auth account — they can still sign in
      but will be treated as a new user.
    </div>
    <div style="font-size:13px;margin-bottom:6px">You are about to remove:</div>
    <div style="background:var(--bg-raised);border-radius:var(--r);padding:12px 14px;font-size:13px">
      <div style="font-weight:700">${esc(u.displayName)||'—'}</div>
      <div style="color:var(--ink-3);font-size:12px">${esc(u.email)||''}</div>
      <div style="margin-top:4px"><span class="um-role-pill um-role-${u.role||'player'}">${u.role||'player'}</span></div>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
     <button class="btn btn-danger" onclick="deleteUser('${uid}')">Remove user</button>`
  );
}

async function deleteUser(uid) {
  if (!db) return;
  try {
    // Delete all memberships
    const snap = await db.collectionGroup('members').where('uid','==',uid).get();
    await Promise.all(snap.docs.map(d => d.ref.delete()));
    // Delete user profile doc
    await db.collection('users').doc(uid).delete();
    // Remove from local cache
    _allUsers = _allUsers.filter(u => u.id !== uid);
    closeModal();
    toast('User removed ✓');
    render();
  } catch(e) {
    toast('Delete failed: ' + (e.message||e.code));
  }
}



function toggleHubFilter(key) {
  APP.hubFilter[key] = !APP.hubFilter[key];
  render();
}

function renderHub() {
  const f = APP.hubFilter;
  const nActive = APP.leagues.filter(l=>(l.status||'active')==='active').length;
  const nDraft  = APP.leagues.filter(l=>l.status==='draft').length;
  const nClosed = APP.leagues.filter(l=>l.status==='closed'||l.status==='archived').length;
  const total   = APP.leagues.length;

  const visible = APP.leagues.filter(lg => {
    // Normalise legacy 'archived' to 'closed'
    if (lg.status === 'archived') lg.status = 'closed';
    const s = lg.status || 'active';
    if (s==='active' && !f.active) return false;
    if (s==='draft'  && !f.draft)  return false;
    if (s==='closed' && !f.closed) return false;
    return true;
  });

  let cards = visible.map(lg=>{
    const st  = leagueStats(lg);
    const ct  = lg.competitionType||'league';
    const ctLabel = ct==='single_elim'?'Single Elim':ct==='double_elim'?'Double Elim':ct==='group_stage'?'Group Stage':'League';
    const ctIcon  = ct==='single_elim'?'🏆':ct==='double_elim'?'⚔️':ct==='group_stage'?'🔱':'📋';
    const isClosed = lg.status==='closed';
    const statusLabel = lg.status==='active'?'Active':lg.status==='draft'?'Draft':'Closed';
    const statusBadge = `<span class="badge badge-${isClosed?'closed':lg.status}">${statusLabel}</span>`;
    const typeBadge   = `<span class="badge badge-${ct}">${ctIcon} ${ctLabel}</span>`;
    const formatBadge = `<span class="badge badge-${lg.format}">${lg.format}</span>`;
    return `
    <div class="league-card" data-ct="${ct}" onclick="openLeague('${lg.id}')" style="${isClosed?'opacity:.72':''}">
      <div class="lc-top">
        <div>
          <div class="lc-name">${esc(lg.name)}</div>
          <div class="lc-meta">
            <span>📅 ${lg.season||'—'}</span>
            ${lg.description?`<span style="color:var(--ink-3)">${esc(lg.description)}</span>`:''}
          </div>
        </div>
        <div class="lc-status">
          ${statusBadge}
          ${typeBadge}
          ${ct==='league'?formatBadge:''}
        </div>
      </div>
      <div class="lc-stats">
        <div class="lc-stat"><div class="lc-stat-val">${st.participants}</div><div class="lc-stat-lbl">${ct!=='league'?'Players':lg.format==='team'?'Teams':'Players'}</div></div>
        <div class="lc-stat"><div class="lc-stat-val">${st.completed}</div><div class="lc-stat-lbl">Played</div></div>
        <div class="lc-stat"><div class="lc-stat-val">${st.remaining}</div><div class="lc-stat-lbl">Remaining</div></div>
      </div>
      <div class="lc-foot">
        <button class="lc-open-btn" onclick="event.stopPropagation();openLeague('${lg.id}')">Open →</button>
        <div class="lc-actions" onclick="event.stopPropagation()">
          <button class="btn-icon" title="Edit"      onclick="openEditLeague('${lg.id}')">✏️</button>
          <button class="btn-icon" title="Duplicate" onclick="duplicateLeague('${lg.id}')">📋</button>
          <button class="btn-icon" title="${isClosed?'Reopen':'Close'}"
            onclick="${isClosed?`reopenCompetition('${lg.id}')`:`closeCompetition('${lg.id}')`}">
            ${isClosed?'🔓':'🔒'}
          </button>
          <button class="btn-icon" title="Delete" style="color:var(--red)" onclick="deleteLeague('${lg.id}')">🗑️</button>
        </div>
      </div>
    </div>`;
  }).join('');

  cards += `<div class="new-league-card" onclick="openCreateLeague()">
    <div class="plus">＋</div>
    <div class="lbl">New competition</div>
  </div>`;

  const hiddenCount = total - visible.length;

  return `
  <div class="hub-header">
    <div class="hub-title"><span class="ball">🎱</span> My Competitions</div>
    ${isLoggedIn()
      ? `<button class="btn btn-primary btn-sm" onclick="openCreateLeague()">+ New competition</button>`
      : `<button class="btn btn-ghost btn-sm" onclick="showAuthScreen()">Sign in to create</button>`}
  </div>

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
    <div class="hub-filters">
      <span style="font-size:12px;color:var(--ink-3);margin-right:2px">Show:</span>
      <button class="filter-tog ${f.active?'on':''}" onclick="toggleHubFilter('active')">
        Active${nActive?` <span style="font-size:10px;opacity:.65">(${nActive})</span>`:''}
      </button>
      <button class="filter-tog ${f.draft?'on':''}" onclick="toggleHubFilter('draft')">
        Draft${nDraft?` <span style="font-size:10px;opacity:.65">(${nDraft})</span>`:''}
      </button>
      <button class="filter-tog ${f.closed?'on':''}" onclick="toggleHubFilter('closed')">
        Closed${nClosed?` <span style="font-size:10px;opacity:.65">(${nClosed})</span>`:''}
      </button>
    </div>
    <span style="font-size:12px;color:var(--ink-3)">${total} total${hiddenCount?` &nbsp;·&nbsp; ${hiddenCount} hidden`:''}</span>
  </div>

  ${visible.length
    ? `<div class="leagues-grid">${cards}</div>`
    : `<div class="empty">
        <div class="empty-icon">🎱</div>
        <div class="empty-text">
          No competitions match the current filter.
          ${!f.closed&&nClosed?`<br><a href="#" onclick="toggleHubFilter('closed');return false" style="color:var(--gold)">Show ${nClosed} closed</a>`:
            !f.active&&nActive?`<br><a href="#" onclick="toggleHubFilter('active');return false" style="color:var(--gold)">Show ${nActive} active</a>`:''}
        </div>
      </div>`
  }`;
}

function renderDashboard() {
  const isTeam=APP.config.format==='team';

  const thH=(col,lbl)=>{
    const s=APP.sortCol===col;
    return `<th class="${s?'sorted':''}" onclick="APP.sortCol='${col}';APP.sortDir=APP.sortCol==='${col}'?-APP.sortDir:-1;render()">${lbl}${s?(APP.sortDir<0?' ↓':' ↑'):''}</th>`;
  };

  let rows='';
  standings.forEach((row,i)=>{

  });

  let psHtml='';
  if(isTeam){
    const ps=sortRows(computePlayerStats());
    let pr='';
    ps.forEach((row,i)=>{
      const fd=row.fw-row.fl;
      pr+=`<tr>
        <td><span class="rank-cell ${i===0?'r1':i===1?'r2':i===2?'r3':''}">${i+1}</span></td>
        <td class="name-cell">${esc(row.name)}</td>
        <td style="color:var(--ink-2)">${row.team}</td>
        <td>${row.p}</td>
        <td style="color:var(--green)">${row.w}</td>
        <td style="color:var(--ink-2)">${row.d}</td>
        <td style="color:var(--red)">${row.l}</td>

      ${thH('rank','#')}${thH('name','Player')}<th>Team</th>
      ${thH('p','P')}${thH('w','W')}${thH('d','D')}${thH('l','L')}${thH('fd','F/D')}${thH('hb','High Brk')}${thH('pts','Pts')}

  return `

// HIGH BREAKS
// ══════════════════════════════════════════════════════════
function renderHighBreaks() {
  const threshold = APP.config.highBreakThreshold ?? 50;
  const trackEnabled = APP.config.trackHighBreaks !== false;
  const sorted = [...APP.breaks].filter(b=>b.score>=threshold).sort((a,b)=>b.score-a.score);

  // Per-player best break for the "personal best" column
  const playerBest = {};
  sorted.forEach(b=>{ if(!playerBest[b.playerId]||b.score>playerBest[b.playerId]) playerBest[b.playerId]=b.score; });

  // Century count (breaks ≥ 100)
  const centuries = sorted.filter(b=>b.score>=100).length;
  const maxBreaks = sorted.filter(b=>b.score===147).length;

  let rows = '';
  sorted.forEach((b, i) => {
    const is147 = b.score === 147;
    const isCentury = b.score >= 100;
    const isPersonalBest = playerBest[b.playerId] === b.score;
    const matchLink = APP.matches.find(m=>m.id===b.matchId);
    const matchVs = matchLink ? `${getName(matchLink.entityA)} vs ${getName(matchLink.entityB)}` : '—';
    rows += `<div class="hb-row">
      <div class="hb-rank ${i===0?'r1':i===1?'r2':i===2?'r3':''}">${i+1}</div>
      <div>
        <div class="hb-player">${esc(b.playerName)}</div>
        <div class="hb-meta">${matchVs}${b.frame?' · Frame '+b.frame:''}</div>
      </div>
      <div>
        <div class="hb-score ${is147?'max':''}">${b.score}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
        ${is147?`<span class="hb-badge-max">🎱 Maximum</span>`:''}
        ${isCentury&&!is147?`<span class="hb-badge-century">Century</span>`:''}
        ${isPersonalBest&&!is147?`<span style="font-size:10px;color:var(--ink-3)">PB</span>`:''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
        <div class="hb-date">${b.date||'—'}</div>
        <div style="font-size:10px;color:var(--ink-3)">${esc(b.venue)||''}</div>
        <button class="btn-icon" style="font-size:13px;margin-top:2px" title="Remove" onclick="delBreak('${b.id}')">🗑</button>
      </div>
    </div>`;
  });

  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px">
    <div class="sec-title" style="margin:0">High breaks</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-ghost btn-sm" onclick="openConfigBreakThreshold()">⚙️ Set threshold</button>
      <button class="btn btn-primary btn-sm" onclick="openAddBreak()">+ Log break</button>
    </div>
  </div>

  <div class="summary-bar" style="margin-bottom:20px">
    <div class="summary-item">
      <div class="summary-val gold">${threshold}+</div>
      <div class="summary-lbl">Threshold</div>
    </div>
    <div class="summary-item">
      <div class="summary-val">${sorted.length}</div>
      <div class="summary-lbl">Qualifying breaks</div>
    </div>
    <div class="summary-item">
      <div class="summary-val">${centuries}</div>
      <div class="summary-lbl">Centuries (100+)</div>
    </div>
    ${maxBreaks?`<div class="summary-item"><div class="summary-val gold">⭐ ${maxBreaks}</div><div class="summary-lbl">Maximum${maxBreaks!==1?'s':''}</div></div>`:''}
    ${sorted.length?`<div class="summary-item"><div class="summary-val gold">${sorted[0].score}</div><div class="summary-lbl">Top break</div><div class="summary-sub">${sorted[0].playerName}</div></div>`:''}
  </div>

  ${!trackEnabled?`<div class="alert alert-warn">High break tracking is disabled for this league. Enable it in <a href="#" onclick="nav('config');return false" style="color:var(--amber)">Config → High Breaks</a>.</div>`:''}

  <div class="hb-threshold-note">
    <span>Showing all breaks scored ${threshold} or above</span>
    <span style="color:var(--border-2)">·</span>
    <a href="#" onclick="openConfigBreakThreshold();return false" style="color:var(--gold-dim);font-size:11px">Change threshold</a>
  </div>

  ${sorted.length ? `
  <div class="panel" style="padding:0;overflow:hidden">
    <div style="display:grid;grid-template-columns:48px 1fr 80px 120px 80px;gap:12px;padding:8px 16px;background:var(--bg);border-bottom:1px solid var(--border-2)">
      <div style="font-size:11px;font-weight:600;color:var(--ink-2)">#</div>
      <div style="font-size:11px;font-weight:600;color:var(--ink-2)">Player</div>
      <div style="font-size:11px;font-weight:600;color:var(--ink-2)">Break</div>
      <div style="font-size:11px;font-weight:600;color:var(--ink-2)">Award</div>
      <div style="font-size:11px;font-weight:600;color:var(--ink-2);text-align:right">Date</div>
    </div>
    <div class="hb-list">${rows}</div>
  </div>` : `<div class="empty"><div class="empty-icon">🎯</div><div class="empty-text">No breaks ≥${threshold} logged yet.<br>Breaks are added automatically from frame scores, or log one manually.</div></div>`}`;
}

// ══════════════════════════════════════════════════════════
// FIXTURES
// ══════════════════════════════════════════════════════════
function renderFixtures() {
  const grp={live:[],scheduled:[],completed:[]};
  [...APP.matches]
    .sort((a,b)=>{
      // Sort: live first, then scheduled by date asc, then completed by date desc
      if(a.status==='live'&&b.status!=='live') return -1;
      if(b.status==='live'&&a.status!=='live') return 1;
      if(a.status==='scheduled'&&b.status==='scheduled') return (a.date||'').localeCompare(b.date||'');
      if(a.status==='completed'&&b.status==='completed') return (b.date||'').localeCompare(a.date||'');
      return 0;
    })
    .forEach(m=>{if(grp[m.status])grp[m.status].push(m);});

  // Build venue suggestion list from all existing match venues in this league
  const allVenues=[...new Set(APP.matches.map(m=>m.venue).filter(v=>v&&v!=='TBD'))];
  // Also pull home venues from teams
  APP.teams.forEach(t=>{if(t.venue&&!allVenues.includes(t.venue))allVenues.push(t.venue);});

  const needsDetails = APP.matches.filter(m=>m.status==='scheduled'&&(!m.date||!m.venue||m.venue==='TBD')).length;

  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:${needsDetails?'10px':'18px'};flex-wrap:wrap;gap:10px">
    <div class="sec-title" style="margin:0">Match fixtures</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-ghost btn-sm" onclick="openRRModal()">⚙️ Generate fixtures</button>
      <button class="btn btn-primary btn-sm" onclick="openAddMatch()">+ Add match</button>
    </div>
  </div>
  ${needsDetails?`<div class="alert alert-warn" style="margin-bottom:18px">⚠ ${needsDetails} fixture${needsDetails!==1?'s are':' is'} missing a date or venue. Click <strong>📅 Set details</strong> on each to fill them in.</div>`:''}`;

  ['live','scheduled','completed'].forEach(status=>{
    const g=grp[status]; if(!g.length)return;
    const grpLabel = status==='live'?'🔴 Live now':status==='scheduled'?'📋 Scheduled':'✅ Completed';
    html+=`<div style="font-size:12px;font-weight:600;color:var(--ink-2);margin:20px 0 8px;padding-left:2px">${grpLabel} <span style="color:var(--ink-3);font-weight:400;font-size:11px">(${g.length})</span></div>`;
    g.forEach(m=>{
      const aName=getName(m.entityA),bName=getName(m.entityB);
      const hasScore = m.status!=='scheduled';
      const fl = (m.frameDetails||[]).length;
      const missingDate = !m.date;
      const missingVenue = !m.venue||m.venue==='TBD';
      const incomplete = (missingDate||missingVenue) && m.status==='scheduled';

      // Date display — editable inline for scheduled/live
      const dateEl = (m.status==='scheduled'||m.status==='live')
        ? `<span class="fixture-inline-field ${missingDate?'missing':''}" onclick="inlineEditDate('${m.id}',this)" title="Click to set date">
            📅 ${missingDate?'<span style="color:var(--amber)">Set date</span>':m.date}
           </span>`
        : (m.date?`<span style="font-size:12px;color:var(--ink-2)">📅 ${m.date}</span>`:'');

      // Venue display — editable inline for scheduled/live
      const venueEl = (m.status==='scheduled'||m.status==='live')
        ? `<span class="fixture-inline-field ${missingVenue?'missing':''}" onclick="inlineEditVenue('${m.id}',this,'${allVenues.join('|')}')" title="Click to set venue">
            📍 ${missingVenue?'<span style="color:var(--amber)">Set venue</span>':m.venue}
           </span>`
        : (m.venue&&m.venue!=='TBD'?`<span style="font-size:12px;color:var(--ink-2)">📍 ${m.venue}</span>`:'');

      html+=`<div class="match-card ${m.status==='live'?'live':''} ${incomplete?'needs-details':''}">
        <div class="match-top">
          <span class="badge badge-${m.status}">${m.status}</span>
          ${dateEl}
          ${venueEl}
          ${m.round?`<span style="font-size:11px;color:var(--ink-3)">Round ${m.round}</span>`:''}
          ${fl?`<span style="font-size:11px;color:var(--ink-3)">${fl} frames logged</span>`:''}
        </div>
        <div class="match-vs-row">
          <div class="match-names">${esc(aName)}<span class="match-vs">vs</span>${esc(bName)}</div>
          ${hasScore
            ? `<div class="score-row"><div class="score-box">${m.scoreA}</div><span style="color:var(--ink-3)">–</span><div class="score-box">${m.scoreB}</div></div>`
            : `<span style="font-size:12px;color:var(--ink-3)">Not yet played</span>`}
        </div>
        ${m.status==='completed'&&(m.highBreakA||m.highBreakB)
          ?`<div class="hb-note" style="margin-top:8px">High breaks: ${aName} <span>${m.highBreakA||0}</span> &nbsp;·&nbsp; ${bName} <span>${m.highBreakB||0}</span>${fl?` &nbsp;·&nbsp;<a href="#" onclick="openFrameLog('${m.id}');return false" style="color:var(--gold);font-size:11px">View frame log</a>`:''}</div>`
          :''}
        <div class="match-foot">
          ${m.status!=='completed'?`<button class="btn btn-primary btn-xs" onclick="openScoreEntry('${m.id}')">Enter score</button>`:''}
          ${m.status==='scheduled'?`<button class="btn btn-ghost btn-xs" onclick="openEditFixture('${m.id}')">📅 Set details</button>`:''}
          ${m.status==='scheduled'?`<button class="btn btn-ghost btn-xs" onclick="setStatus('${m.id}','live')">▶ Mark live</button>`:''}
          ${m.status==='live'?`<button class="btn btn-ghost btn-xs" onclick="openEditFixture('${m.id}')">📅 Edit details</button>`:''}
          ${m.status==='live'?`<button class="btn btn-ghost btn-xs" onclick="openSyncModal('${m.id}')">🔗 Sync Max147</button>`:''}
          ${m.status==='completed'?`<button class="btn btn-ghost btn-xs" onclick="openScoreEntry('${m.id}')">✏️ Edit score</button>`:''}
          ${m.status==='completed'?`<button class="btn btn-ghost btn-xs" onclick="openEditFixture('${m.id}')">📅 Edit details</button>`:''}
          <button class="btn btn-danger btn-xs" onclick="delMatch('${m.id}')">Remove</button>
        </div>
      </div>`;
    });
  });

  if(!APP.matches.length) html+=`<div class="empty"><div class="empty-icon">🎱</div><div class="empty-text">No matches yet. Generate fixtures or add one manually.</div></div>`;
  return html;
}

async function saveFixtureDetails(matchId) {
  const m = APP.matches.find(x=>x.id===matchId);
  const date   = document.getElementById('ef-date').value.trim();
  const venue  = document.getElementById('ef-venue').value.trim();
  const status = document.getElementById('ef-status').value;

  if (!date)  { toast('Please set a date'); return; }
  if (!venue) { toast('Please enter a venue'); return; }

  m.date   = date;
  m.venue  = venue;
  m.status = status;

  await persistInLeague('matches', matchId, m);
  closeModal();
  toast('Fixture details saved ✓');
  render();
}

// ── INLINE EDITING (click-in-place on card) ────────────────
function inlineEditDate(matchId, el) {
  const m = APP.matches.find(x=>x.id===matchId);
  const input = document.createElement('input');
  input.type  = 'date';
  input.value = m.date||'';
  input.style.cssText = 'font-size:12px;padding:3px 6px;border-radius:5px;border:1px solid var(--gold-dim);background:var(--bg-mid);color:var(--ink);width:140px';
  el.replaceWith(input);
  input.focus();
  const commit = async () => {
    const val = input.value;
    if (val) {
      m.date = val;
      await persistInLeague('matches', matchId, m);
      toast('Date saved ✓');
    }
    render();
  };
  input.addEventListener('change', commit);
  input.addEventListener('blur',   commit);
  input.addEventListener('keydown', e=>{ if(e.key==='Escape') render(); if(e.key==='Enter') input.blur(); });
}

function inlineEditVenue(matchId, el, venueListStr) {
  const m = APP.matches.find(x=>x.id===matchId);
  const venues = venueListStr ? venueListStr.split('|').filter(Boolean) : [];

  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:inline-flex;align-items:center;gap:4px;position:relative';

  const input = document.createElement('input');
  input.type  = 'text';
  input.value = (m.venue&&m.venue!=='TBD') ? m.venue : '';
  input.placeholder = 'Enter venue…';
  input.style.cssText = 'font-size:12px;padding:3px 8px;border-radius:5px;border:1px solid var(--gold-dim);background:var(--bg-mid);color:var(--ink);width:180px';

  // Datalist for suggestions
  const dlId = 'venue-dl-'+matchId;
  const dl = document.createElement('datalist');
  dl.id = dlId;
  venues.forEach(v=>{ const o=document.createElement('option'); o.value=v; dl.appendChild(o); });
  input.setAttribute('list', dlId);

  wrap.appendChild(input);
  wrap.appendChild(dl);
  el.replaceWith(wrap);
  input.focus();

  const commit = async () => {
    const val = input.value.trim();
    if (val) {
      m.venue = val;
      await persistInLeague('matches', matchId, m);
      toast('Venue saved ✓');
    }
    render();
  };
  input.addEventListener('blur',    commit);
  input.addEventListener('keydown', e=>{ if(e.key==='Escape') render(); if(e.key==='Enter') input.blur(); });
}

// ── TEMPLATE DOWNLOAD ─────────────────────────────────────
function downloadTemplate(format) {
  const isTeam = APP.config.format === 'team';

  if (format === 'csv') {
    // CSV template
    const headers = isTeam
      ? 'Team Name,Venue,Player 1 Name,Player 1 Contact,Player 2 Name,Player 2 Contact,Player 3 Name,Player 3 Contact'
      : 'Name,Contact (email or phone),Handicap';
    const example = isTeam
      ? 'Cue Masters,Table 1,Ronnie O\'Sullivan,ronnie@max147.com,Judd Trump,judd@max147.com,,,\nBreak Artists,Table 2,Mark Selby,mark@max147.com,Neil Robertson,neil@max147.com,,,,'
      : "Ronnie O'Sullivan,ronnie@max147.com,0\nJudd Trump,judd@max147.com,0\nMark Selby,mark@max147.com,2";
    const csv = headers + '\n' + example;
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `max147_${isTeam?'teams':'players'}_template.csv`;
    a.click(); URL.revokeObjectURL(a.href);
    toast('CSV template downloaded ✓');
  } else {
    // Excel template using SheetJS
    if (typeof XLSX === 'undefined') { toast('SheetJS not loaded — use CSV instead'); return; }
    const wb = XLSX.utils.book_new();

    if (isTeam) {
      const data = [
        ['Team Name','Venue','Player 1 Name','Player 1 Contact','Player 2 Name','Player 2 Contact','Player 3 Name','Player 3 Contact'],
        ['Cue Masters','Table 1','Ronnie O\'Sullivan','ronnie@max147.com','Judd Trump','judd@max147.com','',''],
        ['Break Artists','Table 2','Mark Selby','mark@max147.com','Neil Robertson','neil@max147.com','',''],
      ];
      const ws = XLSX.utils.aoa_to_sheet(data);
      ws['!cols'] = [14,12,20,24,20,24,20,24].map(w=>({wch:w}));
      XLSX.utils.book_append_sheet(wb, ws, 'Teams');
    } else {
      const data = [
        ['Name','Contact (email or phone)','Handicap'],
        ["Ronnie O'Sullivan",'ronnie@max147.com',0],
        ['Judd Trump','judd@max147.com',0],
        ['Mark Selby','mark@max147.com',2],
        ['Neil Robertson','neil@max147.com',0],
      ];
      const ws = XLSX.utils.aoa_to_sheet(data);
      ws['!cols'] = [{wch:24},{wch:28},{wch:10}];
      // Style header row
      ['A1','B1','C1'].forEach(ref => {
        if (!ws[ref]) return;
        ws[ref].s = { font:{ bold:true }, fill:{ fgColor:{ rgb:'0F2218' } } };
      });
      XLSX.utils.book_append_sheet(wb, ws, 'Players');
    }

    // Add instructions sheet
    const infoData = [
      ['MAX147 League Manager — Participant Import Template'],
      [''],
      ['Instructions:'],
      ['1. Fill in the Players (or Teams) sheet — do not change column headers'],
      ['2. Name is required. Contact and Handicap are optional.'],
      ['3. Handicap should be a number (0 = no handicap)'],
      ['4. Save the file, then upload it in the Participants tab'],
      ['5. Existing players will NOT be removed — the import adds to the list'],
      [''],
      ['Supported formats: .xlsx  .xls  .csv'],
    ];
    const infoWs = XLSX.utils.aoa_to_sheet(infoData);
    infoWs['!cols'] = [{wch:60}];
    XLSX.utils.book_append_sheet(wb, infoWs, 'Instructions');

    XLSX.writeFile(wb, `max147_${isTeam?'teams':'players'}_template.xlsx`);
    toast('Excel template downloaded ✓');
  }
}

function handleImportDrop(event) {
  const file = event.dataTransfer.files[0];
  if (file) handleImportFile(file);
}

function handleImportFile(file) {
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { toast('File too large — max 5MB'); return; }

  const ext = file.name.split('.').pop().toLowerCase();
  const reader = new FileReader();

  if (ext === 'csv') {
    reader.onload = e => parseCSVImport(e.target.result);
    reader.readAsText(file);
  } else if (ext === 'xlsx' || ext === 'xls') {
    reader.onload = e => parseExcelImport(e.target.result);
    reader.readAsArrayBuffer(file);
  } else {
    toast('Unsupported format — use .csv, .xlsx, or .xls');
  }
}

// ── CSV PARSER ─────────────────────────────────────────────
function parseCSVImport(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (!lines.length) { toast('Empty file'); return; }

  // Detect header row (first row — skip it)
  const header = lines[0].toLowerCase();
  const hasHeader = header.includes('name') || header.includes('player') || header.includes('contact');
  const dataLines = hasHeader ? lines.slice(1) : lines;

  const rows = dataLines.map(line => parseCSVLine(line));
  processImportRows(rows, hasHeader ? lines[0] : null);
}

function parseCSVLine(line) {
  // RFC 4180 CSV parser
  const cols = [];
  let current = '', inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQuote && line[i+1] === '"') { current += '"'; i++; }
      else inQuote = !inQuote;
    } else if (ch === ',' && !inQuote) {
      cols.push(current.trim()); current = '';
    } else {
      current += ch;
    }
  }
  cols.push(current.trim());
  return cols;
}

// ── EXCEL PARSER ───────────────────────────────────────────
function parseExcelImport(arrayBuffer) {
  if (typeof XLSX === 'undefined') {
    toast('Excel parsing not available — please use CSV format');
    return;
  }
  try {
    const wb = XLSX.read(arrayBuffer, { type: 'array' });
    // Use first sheet that isn't named "Instructions"
    const sheetName = wb.SheetNames.find(n => n.toLowerCase() !== 'instructions') || wb.SheetNames[0];
    const ws = wb.Sheets[sheetName];
    const data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
    if (!data.length) { toast('Empty sheet'); return; }

    // First row is header
    const header = data[0];
    const rows = data.slice(1).filter(r => r.some(cell => String(cell).trim()));
    processImportRows(rows, header.join(','));
  } catch(e) {
    toast('Could not read Excel file: ' + e.message);
  }
}

// ── PROCESS PARSED ROWS ────────────────────────────────────
function processImportRows(rows, headerLine) {
  const isTeam = APP.config.format === 'team';
  const existingNames = new Set(APP.players.map(p => p.name.toLowerCase().trim()));
  const processed = [];

  rows.forEach((cols, i) => {
    if (!cols.length || !cols[0]) return;
    const name    = String(cols[0]).trim();
    const contact = String(cols[1] || '').trim();
    const handicap= parseInt(cols[2]) || 0;

    if (!name) return;

    const isDuplicate = existingNames.has(name.toLowerCase());
    const isValid     = name.length >= 1 && name.length <= 80;

    processed.push({
      name, contact, handicap,
      status: isDuplicate ? 'duplicate' : !isValid ? 'error' : 'ok',
      error:  !isValid ? 'Name too long (max 80 chars)' : isDuplicate ? 'Already in list' : null,
    });
  });

  if (!processed.length) {
    document.getElementById('import-preview-area').innerHTML =
      `<div class="alert alert-warn" style="margin-top:12px">No valid rows found. Check your file format matches the template.</div>`;
    return;
  }

  window._importRows = processed;

  const okCount   = processed.filter(r=>r.status==='ok').length;
  const dupCount  = processed.filter(r=>r.status==='duplicate').length;
  const errCount  = processed.filter(r=>r.status==='error').length;
  const showMax   = 8;
  const shown     = processed.slice(0, showMax);

  const rows_html = shown.map(r => `
    <div class="import-preview-row">
      <div style="font-weight:${r.status==='ok'?600:400}">${esc(r.name)}</div>
      <div style="color:var(--ink-3)">${esc(r.contact)||'—'}</div>
      <div class="import-row-${r.status==='ok'?'ok':r.status==='duplicate'?'warn':'err'}">
        ${r.status==='ok'?'✓ Ready':r.status==='duplicate'?'Skip (exists)':'✗ '+r.error}
      </div>
    </div>`).join('');

  const more = processed.length > showMax
    ? `<div style="padding:8px 14px;font-size:11px;color:var(--ink-3)">…and ${processed.length-showMax} more rows</div>`
    : '';

  document.getElementById('import-preview-area').innerHTML = `
    <div class="import-preview">
      <div class="import-preview-hd">
        <span>Preview — ${processed.length} rows</span>
        <span style="font-size:11px">
          <span style="color:var(--green)">${okCount} ready</span>
          ${dupCount?`&nbsp;·&nbsp;<span style="color:var(--amber)">${dupCount} skip</span>`:''}
          ${errCount?`&nbsp;·&nbsp;<span style="color:var(--red)">${errCount} error</span>`:''}
        </span>
      </div>
      <div class="import-preview-row" style="background:var(--bg-raised);font-weight:600;font-size:11px;color:var(--ink-2)">
        <div>Name</div><div>Contact</div><div>Status</div>
      </div>
      ${rows_html}${more}
    </div>`;

  // Show confirm button only if there's something to import
  const btn = document.getElementById('import-confirm-btn');
  if (btn) {
    btn.style.display = okCount > 0 ? '' : 'none';
    btn.textContent = `Import ${okCount} player${okCount!==1?'s':''}`;
  }
}

// ── CONFIRM IMPORT ─────────────────────────────────────────
async function confirmImport() {
  const rows = window._importRows;
  if (!rows) return;

  const toAdd = rows.filter(r => r.status === 'ok');
  if (!toAdd.length) { toast('Nothing to import'); return; }

  let added = 0;
  for (const row of toAdd) {
    const p = { id:genId(), name:row.name, contact:row.contact, handicap:row.handicap };
    APP.players.push(p);
    await persistInLeague('players', p.id, p);
    added++;
  }

  saveActiveToLocal();
  closeModal();
  toast(`✓ ${added} player${added!==1?'s':''} imported`);
  window._importRows = null;
  render();
}

// ── EXPORT PARTICIPANTS ────────────────────────────────────
function exportParticipants() {
  const isTeam = APP.config.format === 'team';
  const lgName = (APP.config.name || 'competition').replace(/[^a-z0-9]/gi,'_').toLowerCase();

  if (typeof XLSX === 'undefined') {
    // Fallback to CSV if SheetJS not loaded
    exportParticipantsCSV();
    return;
  }

  const wb = XLSX.utils.book_new();

  if (isTeam) {
    const header = ['Team Name','Venue','Players'];
    const rows = APP.teams.map(t => {
      const names = (t.players||[]).map(pid => {
        const p = APP.players.find(x=>x.id===pid);
        return p ? p.name : pid;
      }).join(', ');
      return [t.name, t.venue||'', names];
    });
    const ws = XLSX.utils.aoa_to_sheet([header,...rows]);
    ws['!cols'] = [{wch:24},{wch:16},{wch:48}];
    XLSX.utils.book_append_sheet(wb, ws, 'Teams');
  } else {
    const header = ['#','Name','Contact','Handicap'];
    const rows = APP.players.map((p,i) => [i+1, p.name, p.contact||'', p.handicap||0]);
    const ws = XLSX.utils.aoa_to_sheet([header,...rows]);
    ws['!cols'] = [{wch:5},{wch:26},{wch:28},{wch:10}];
    XLSX.utils.book_append_sheet(wb, ws, 'Players');
  }

  // Add stats sheet for individual format
  if (!isTeam && APP.matches.some(m=>m.status==='completed')) {
    const statsHeader = ['Name','Played','Won','Drawn','Lost','Points','High Break'];
    const statsRows = computeStandings().map(s => [s.name,s.p,s.w,s.d,s.l,s.pts,s.hb||0]);
    const statsWs = XLSX.utils.aoa_to_sheet([statsHeader,...statsRows]);
    statsWs['!cols'] = [{wch:24},{wch:8},{wch:7},{wch:8},{wch:7},{wch:8},{wch:12}];
    XLSX.utils.book_append_sheet(wb, statsWs, 'Standings');
  }

  XLSX.writeFile(wb, `max147_${lgName}_players.xlsx`);
  toast('Players exported to Excel ✓');
}

function exportParticipantsCSV() {
  const rows = [['Name','Contact','Handicap']];
  APP.players.forEach(p => rows.push([p.name, p.contact||'', p.handicap||0]));
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type:'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download='max147_players.csv'; a.click();
  URL.revokeObjectURL(a.href);
  toast('Players exported to CSV ✓');
}

// ── DASHBOARD: Group standings cards only ─────────────────
function renderGroupStandings() {
  const q = APP.config.qualifiersPerGroup || 1;
  const gsComplete = groupStageComplete();
  const qualifiers = getQualifiers();
  const totalGM  = APP.groupMatches.length;
  const playedGM = APP.groupMatches.filter(m=>m.status==='completed').length;
  const liveGM   = APP.groupMatches.filter(m=>m.status==='live').length;

  const summaryBar = `<div class="summary-bar" style="margin-bottom:20px">
    <div class="summary-item"><div class="summary-val gold">${APP.players.length}</div><div class="summary-lbl">Players</div></div>
    <div class="summary-item"><div class="summary-val gold">${APP.groups.length}</div><div class="summary-lbl">Groups</div></div>
    <div class="summary-item"><div class="summary-val">${playedGM}</div><div class="summary-lbl">Played</div></div>
    <div class="summary-item"><div class="summary-val">${totalGM-playedGM}</div><div class="summary-lbl">Remaining</div></div>
    ${liveGM?`<div class="summary-item"><div class="summary-val green">${liveGM}</div><div class="summary-lbl">Live</div></div>`:''}
    ${gsComplete?`<div class="summary-item"><div class="summary-val gold" style="font-size:13px">✓ Done</div><div class="summary-lbl">Group stage</div></div>`:''}
  </div>`;

  // Group standings grid
  let groupCards = '';
  if (APP.groups.length) {
    groupCards = `<div class="gs-groups-grid">` +
      APP.groups.map(grp => {
        const standings = computeGroupStandings(grp.id);
        const gms = APP.groupMatches.filter(m=>m.groupId===grp.id);
        const done = groupComplete(grp.id);
        const played = gms.filter(m=>m.status==='completed').length;

        const rows = standings.map((row,i) => {
          const fd = row.fw - row.fl;
          const isQ = i < q;
          return `<div class="gs-standings-row ${isQ?'qualified':''}">
            <div class="gs-pos ${isQ?'q':''}">${i+1}</div>
            <div class="gs-pname">${esc(row.name)}</div>
            <div class="gs-num">${row.p}</div>
            <div class="gs-num">${row.w}</div>
            <div class="gs-num">${row.d}</div>
            <div class="gs-fd ${fd>=0?'pos':'neg'}">${fd>0?'+':''}${fd}</div>
            <div class="gs-pts">${row.pts}</div>
          </div>`;
        }).join('');

        return `<div class="gs-group-card">
          <div class="gs-group-hd">
            <div class="gs-group-name">${esc(grp.name)}</div>
            <div class="gs-group-status">${done?'✓ Complete':`${played}/${gms.length} played`}</div>
          </div>
          <div class="gs-standings-hd">
            <div></div><div>Player</div>
            <div style="text-align:center">P</div>
            <div style="text-align:center">W</div>
            <div style="text-align:center">D</div>
            <div style="text-align:center">F/D</div>
            <div style="text-align:center">Pts</div>
          </div>
          ${rows || `<div style="padding:12px 14px;font-size:12px;color:var(--ink-3)">No matches played yet.</div>`}
        </div>`;
      }).join('') + `</div>`;
  } else {
    groupCards = `<div class="empty">
      <div class="empty-icon">🔱</div>
      <div class="empty-text">Groups not set up yet.<br>
      ${canEditCompetition(APP.activeLeagueId)
        ? `<button class="btn btn-primary" onclick="nav('fixtures')" style="margin-top:12px">⚙️ Set up groups</button>`
        : 'Ask the competition owner to set up groups.'}
      </div>
    </div>`;
  }

  // Qualifier strip when group stage complete
  const qualifierStrip = gsComplete && qualifiers.length ? `
  <div style="margin-top:8px;padding:14px 16px;background:rgba(201,168,76,.07);border:1px solid var(--border-2);border-radius:var(--r-lg);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
    <div>
      <div style="font-size:13px;font-weight:700;color:var(--gold)">🏆 Group stage complete</div>
      <div style="font-size:12px;color:var(--ink-2);margin-top:2px">${qualifiers.length} players advance to the knockout stage</div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="nav('fixtures')">View knockout bracket →</button>
  </div>` : '';

  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px">
    <div class="sec-title" style="margin:0">🔱 Group Standings — ${esc(APP.config.name||'')}</div>
  </div>
  ${summaryBar}
  ${groupCards}
  ${qualifierStrip}`;
}

  const liveM    = APP.groupMatches.filter(m=>m.status==='live');

  const phaseTabs = `<div class="gs-phase-tabs">
    <div class="gs-phase-tab ${phase==='groups'?'active':''}" onclick="APP.gsPhase='groups';render()">

      ⚙️ Setup groups
    </div>`:''}

  const header = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">

  }
}

// Inline shuffle preview (called from the setup panel)
function gsPreviewInline() {
  const gc  = +document.getElementById('gs-gcount')?.value || 4;
  const players = [...APP.players].sort(()=>Math.random()-0.5);
  const groups = Array.from({length:gc}, (_,i)=>({
    name:`Group ${String.fromCharCode(65+i)}`, players:[]
  }));
  players.forEach((p,i) => groups[i%gc].players.push(p));
  window._gsPreview = groups;
  const preview = document.getElementById('gs-inline-preview');
  if (preview) {

// Commit inline (no modal needed)
async function commitGroupSetupInline() {
  if (!window._gsPreview) { gsPreviewInline(); await new Promise(r=>setTimeout(r,50)); }
  const groups = window._gsPreview;
  if (!groups) { toast('Click Shuffle preview first'); return; }
  const qpg = +document.getElementById('gs-qpg')?.value || 1;
  const bo  = +document.getElementById('gs-bo')?.value  || 5;

  APP.config.groupCount = groups.length;
  APP.config.qualifiersPerGroup = qpg;
  APP.config.bestOf = bo;
  const lg = APP.leagues.find(l=>l.id===APP.activeLeagueId);
  if (lg) { lg.groupCount=groups.length; lg.qualifiersPerGroup=qpg; lg.bestOf=bo; }
  await persistLeague({...APP.config, id:APP.activeLeagueId});

  APP.groups = groups.map(g=>({ id:genId(), name:g.name, playerIds:g.players.map(p=>p.id) }));

  // Generate round-robin within each group
  APP.groupMatches = [];
  APP.groups.forEach(grp=>{
    const pids = grp.playerIds;
    const n = pids.length%2===0?pids.length:pids.length+1;
    const rotating = [...pids.slice(1)];
    const fixed = pids[0];
    for (let r=0; r<n-1; r++) {
      const rp=[fixed,...rotating];
      for (let i=0;i<n/2;i++){
        const a=rp[i],b=rp[n-1-i];
        if(a&&b&&a!==b){
          APP.groupMatches.push({
            id:genId(),groupId:grp.id,entityA:a,entityB:b,
            scoreA:0,scoreB:0,highBreakA:0,highBreakB:0,
            status:'scheduled',date:'',venue:'',frameDetails:[]
          });
        }
      }
      rotating.push(rotating.shift());
    }
  });

  APP.knockoutMatches=[];
  await Promise.all([
    ...APP.groups.map(g=>persistInLeague('groups',g.id,g)),
    ...APP.groupMatches.map(m=>persistInLeague('groupMatches',m.id,m))
  ]);
  saveActiveToLocal();
  toast(`${APP.groups.length} groups · ${APP.groupMatches.length} fixtures generated ✓`);
  APP.gsPhase='groups';
  render();
}

// GROUP STAGE ENGINE

// Compute standings for a single group
function computeGroupStandings(groupId) {
  const {pointsWin=3, pointsDraw=1, pointsLose=0} = APP.config;
  const grp = APP.groups.find(g=>g.id===groupId);
  if (!grp) return [];
  const map = {};
  grp.playerIds.forEach(pid=>{
    const p = APP.players.find(p=>p.id===pid)||{id:pid,name:pid};
    map[pid] = {id:pid, name:p.name, p:0, w:0, d:0, l:0, fw:0, fl:0, hb:0, pts:0};
  });
  APP.groupMatches.filter(m=>m.groupId===groupId&&m.status==='completed').forEach(m=>{
    const a=map[m.entityA], b=map[m.entityB];
    if(!a||!b) return;
    a.p++;b.p++;
    a.fw+=m.scoreA;a.fl+=m.scoreB;b.fw+=m.scoreB;b.fl+=m.scoreA;
    if((m.highBreakA||0)>a.hb)a.hb=m.highBreakA;
    if((m.highBreakB||0)>b.hb)b.hb=m.highBreakB;
    if(m.scoreA>m.scoreB){a.w++;b.l++;a.pts+=pointsWin;b.pts+=pointsLose;}
    else if(m.scoreA<m.scoreB){b.w++;a.l++;b.pts+=pointsWin;a.pts+=pointsLose;}
    else{a.d++;b.d++;a.pts+=pointsDraw;b.pts+=pointsDraw;}
  });
  return Object.values(map).sort((a,b)=>{
    if(b.pts!==a.pts) return b.pts-a.pts;
    const fa=(a.fw-a.fl), fb=(b.fw-b.fl);
    if(fb!==fa) return fb-fa;
    return b.fw-a.fw;
  });
}

// Get qualifying players from all groups
function getQualifiers() {
  const q = APP.config.qualifiersPerGroup || 1;
  const qualifiers = [];
  APP.groups.forEach(grp=>{
    const standings = computeGroupStandings(grp.id);
    standings.slice(0, q).forEach((row, i)=>{
      qualifiers.push({playerId:row.id, playerName:row.name, groupId:grp.id, groupName:grp.name, pos:i+1});
    });
  });
  return qualifiers;
}

// Check if all group matches are complete
function groupStageComplete() {
  if (!APP.groupMatches.length) return false;
  return APP.groupMatches.every(m=>m.status==='completed');
}

// Check if a specific group is complete
function groupComplete(groupId) {
  const gms = APP.groupMatches.filter(m=>m.groupId===groupId);
  return gms.length > 0 && gms.every(m=>m.status==='completed');
}

// ── GENERATE KNOCKOUT FROM QUALIFIERS ─────────────────────
async function generateKnockout() {
  const qualifiers = getQualifiers();
  if (!qualifiers.length) { toast('No qualifiers yet'); return; }

  // Build single-elim bracket from qualifiers
  const n = qualifiers.length;
  const sz = [2,4,8,16,32].find(s=>s>=n) || n;
  const slots = [...qualifiers.map(q=>q.playerId)];
  while (slots.length < sz) slots.push('BYE');

  const newKO = [];
  // R1 matches
  for (let i=0; i<sz; i+=2) {
    const m = {
      id:genId(), round:1, matchIndex:i/2, slot:'W',
      entityA:slots[i], entityB:slots[i+1],
      scoreA:0, scoreB:0, status:'scheduled',
      winnerId:null, loserId:null, date:'', venue:'',
      isGroupKO: true
    };
    if (slots[i]==='BYE'||slots[i+1]==='BYE') {
      m.status='completed';
      m.winnerId=slots[i]==='BYE'?slots[i+1]:slots[i];
    }
    newKO.push(m);
  }
  // Subsequent rounds
  const rounds = Math.log2(sz);
  for (let r=2; r<=rounds; r++) {
    const prevCount = sz / Math.pow(2, r-1);
    for (let i=0; i<prevCount/2; i++) {
      newKO.push({id:genId(),round:r,matchIndex:i,slot:'W',entityA:'TBD',entityB:'TBD',scoreA:0,scoreB:0,status:'scheduled',winnerId:null,loserId:null,date:'',venue:'',isGroupKO:true});
    }
  }

  APP.knockoutMatches = newKO;
  // Auto-advance byes using existing advanceBracket logic (briefly swap)
  const savedBM = APP.bracketMatches;
  APP.bracketMatches = APP.knockoutMatches;
  newKO.filter(m=>m.status==='completed').forEach(m=>advanceBracket(m));
  APP.knockoutMatches = APP.bracketMatches;
  APP.bracketMatches = savedBM;

  await Promise.all(newKO.map(m=>persistInLeague('knockoutMatches',m.id,m)));
  saveActiveToLocal();
  APP.gsPhase = 'knockout';
  toast('Knockout bracket generated ✓');
  render();
  requestAnimationFrame(()=>drawBracketLines());
}

async function saveGroupMatchScore(matchId) {
  const m = APP.groupMatches.find(x=>x.id===matchId);
  m.scoreA      = +document.getElementById('gms-sa').value;
  m.scoreB      = +document.getElementById('gms-sb').value;
  m.highBreakA  = +document.getElementById('gms-hba').value||0;
  m.highBreakB  = +document.getElementById('gms-hbb').value||0;
  m.status      = document.getElementById('gms-status').value;
  m.date        = document.getElementById('gms-date').value;
  m.venue       = document.getElementById('gms-venue').value.trim();

  // Log qualifying high breaks
  if (m.status==='completed') {
    const thr = APP.config.highBreakThreshold??50;
    for (const [side, pid, hb] of [[m.entityA,m.highBreakA],[m.entityB,m.highBreakB]].map(([a,b])=>[a,b])) {
      if (hb>=thr) {
        const p=APP.players.find(p=>p.id===pid);
        if (p && !APP.breaks.find(b=>b.matchId===matchId&&b.playerId===pid)) {
          const br={id:genId(),playerId:pid,playerName:p.name,score:hb,matchId,date:m.date,venue:m.venue,frame:null};
          APP.breaks.push(br);
          await persistInLeague('breaks',br.id,br);
        }
      }
    }
  }

  await persistInLeague('groupMatches', matchId, m);
  saveActiveToLocal();
  closeModal(); toast('Score saved ✓'); render();
}

        <input id="gs-gcount" type="number" min="2" max="16" value="${gCount}"></div>
      <div class="form-field"><label>Qualifiers per group</label>
        <input id="gs-qpg" type="number" min="1" max="4" value="${qpg}"></div>
      <div class="form-field"><label>Best of (frames)</label>
        <input id="gs-bo" type="number" min="1" max="19" value="${APP.config.bestOf||5}"></div>
    </div>
    <div style="font-size:12px;color:var(--ink-2);margin-bottom:14px">
      ${players.length} players · <span id="gs-calc"></span>
    </div>
    <div id="gs-preview" style="display:grid;grid-template-columns:1fr 1fr;gap:8px"></div>`,
    `<button class="btn btn-ghost btn-sm" onclick="previewGroupSetup()">🎲 Shuffle</button>
     <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="commitGroupSetup()">Lock & generate fixtures</button>`
  );
  previewGroupSetup();
}

function previewGroupSetup() {
  const gc  = +document.getElementById('gs-gcount').value || 4;
  const players = [...APP.players].sort(()=>Math.random()-0.5);
  const groups = Array.from({length:gc}, (_,i)=>({
    name: `Group ${String.fromCharCode(65+i)}`,
    players: []
  }));
  players.forEach((p,i) => groups[i%gc].players.push(p));
  window._gsPreview = groups;

  const calc = document.getElementById('gs-calc');
  if (calc) calc.textContent = `~${Math.ceil(players.length/gc)} players per group`;

  const preview = document.getElementById('gs-preview');
  if (preview) {
    preview.innerHTML = groups.map(g=>`
      <div style="background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px">
        <div style="font-size:11px;font-weight:700;color:var(--gold);margin-bottom:6px">${esc(g.name)}</div>
        ${g.players.map(p=>`<div style="font-size:12px;padding:3px 0;border-bottom:1px solid rgba(201,168,76,.05)">${esc(p.name)}</div>`).join('')}
      </div>`).join('');
  }
}

async function commitGroupSetup() {
  const groups = window._gsPreview;
  if (!groups) { toast('Click shuffle first'); return; }
  const qpg = +document.getElementById('gs-qpg').value || 1;
  const bo  = +document.getElementById('gs-bo').value  || 5;

  APP.config.groupCount = groups.length;
  APP.config.qualifiersPerGroup = qpg;
  APP.config.bestOf = bo;
  const lg = APP.leagues.find(l=>l.id===APP.activeLeagueId);
  if (lg) { lg.groupCount=groups.length; lg.qualifiersPerGroup=qpg; lg.bestOf=bo; }
  await persistLeague({...lg});

  // Build group docs
  APP.groups = groups.map((g,i)=>({
    id: genId(), name: g.name,
    playerIds: g.players.map(p=>p.id)
  }));

  // Generate round-robin within each group
  APP.groupMatches = [];
  APP.groups.forEach(grp=>{
    const pids = grp.playerIds;
    const n = pids.length%2===0?pids.length:pids.length+1;
    const rotating = [...pids.slice(1)];
    const fixed = pids[0];
    for (let r=0; r<n-1; r++) {
      const rp = [fixed,...rotating];
      for (let i=0; i<n/2; i++) {
        const a=rp[i], b=rp[n-1-i];
        if (a&&b&&a!==b) {
          APP.groupMatches.push({
            id:genId(), groupId:grp.id,
            entityA:a, entityB:b,
            scoreA:0, scoreB:0, highBreakA:0, highBreakB:0,
            status:'scheduled', date:'', venue:'', frameDetails:[]
          });
        }
      }
      rotating.push(rotating.shift());
    }
  });

  // Clear old knockout
  APP.knockoutMatches = [];

  await Promise.all([
    ...APP.groups.map(g=>persistInLeague('groups',g.id,g)),
    ...APP.groupMatches.map(m=>persistInLeague('groupMatches',m.id,m))
  ]);
  saveActiveToLocal();
  closeModal(); toast(`${APP.groups.length} groups · ${APP.groupMatches.length} fixtures generated ✓`);
  APP.gsPhase = 'groups';
  render();
}

// ══════════════════════════════════════════════════════════
// BRACKET ENGINE


// Get display name for an entityId that may be 'TBD' or 'BYE'
function getBracketName(id) {
  if (!id || id==='TBD') return 'TBD';
  if (id==='BYE') return 'BYE';
  const p = APP.players.find(p=>p.id===id);
  if (p) return p.name.split(' ').pop(); // surname only for compact display
  const t = APP.teams.find(t=>t.id===id);
  if (t) return t.name;
  return id;
}
function getBracketFullName(id) {
  if (!id || id==='TBD') return 'TBD';
  if (id==='BYE') return 'Bye';
  const p = APP.players.find(p=>p.id===id);
  if (p) return p.name;
  const t = APP.teams.find(t=>t.id===id);
  if (t) return t.name;
  return id;
}

// Build bracket structure from flat bracketMatches array
function buildBracketRounds(slot='W') {
  const matches = APP.bracketMatches.filter(m=>m.slot===slot||(!m.slot&&slot==='W'));
  const maxRound = Math.max(...matches.map(m=>m.round), 0);
  const rounds = [];
  for (let r=1; r<=maxRound; r++) {
    rounds.push(matches.filter(m=>m.round===r).sort((a,b)=>a.matchIndex-b.matchIndex));
  }
  return rounds;
}

// Render a single bracket match node
function renderBracketMatch(m, opts={}) {
  const aName = getBracketName(m.entityA);
  const bName = getBracketName(m.entityB);
  const aFull = getBracketFullName(m.entityA);
  const bFull = getBracketFullName(m.entityB);
  const aWin = m.winnerId===m.entityA;
  const bWin = m.winnerId===m.entityB;
  const done = m.status==='completed';
  const live = m.status==='live';
  const tbd  = !m.entityA||m.entityA==='TBD'||!m.entityB||m.entityB==='TBD';
  const cls  = `bracket-match ${live?'live':done?'done':''} ${opts.grandFinal?'grand-final':''} ${tbd?'':'editable'}`;

  const aScoreCls = done && aWin ? 'bp-score winning' : 'bp-score';
  const bScoreCls = done && bWin ? 'bp-score winning' : 'bp-score';
  const aPlayerCls = done ? (aWin?'bracket-player winner':'bracket-player loser') : m.entityA==='TBD'?'bracket-player tbd':'bracket-player';
  const bPlayerCls = done ? (bWin?'bracket-player winner':'bracket-player loser') : m.entityB==='TBD'?'bracket-player tbd':'bracket-player';

  const clickHandler = tbd ? '' : `onclick="openBracketScoreEntry('${m.id}')"`;

  return `<div class="${cls}" id="bm-${m.id}" data-round="${m.round}" data-idx="${m.matchIndex}" data-slot="${m.slot||'W'}" ${clickHandler} title="${aFull} vs ${bFull}">
    <div class="${aPlayerCls}">
      <span class="bp-name">${esc(aName)}</span>
      <span class="${aScoreCls}">${done||live?m.scoreA:''}</span>
    </div>
    <div class="${bPlayerCls}">
      <span class="bp-name">${esc(bName)}</span>
      <span class="${bScoreCls}">${done||live?m.scoreB:''}</span>
    </div>
  </div>`;
}

// Calculate positions for connector line drawing
// Returns array of {x1,y1,x2,y2} for each line
function drawBracketLines() {
  const svg = document.getElementById('bracket-svg-w');
  if (!svg) return;

  // Clear existing lines
  svg.innerHTML = '';

  const rounds = buildBracketRounds('W');
  for (let r=0; r<rounds.length-1; r++) {
    const curRound = rounds[r];
    const nextRound = rounds[r+1];
    // Each pair in current round feeds one match in next round
    for (let i=0; i<nextRound.length; i++) {
      const topMatch  = curRound[i*2];
      const botMatch  = curRound[i*2+1];
      const nextMatch = nextRound[i];
      if (!topMatch || !nextMatch) continue;

      const topEl  = document.getElementById('bm-'+topMatch.id);
      const botEl  = botMatch ? document.getElementById('bm-'+botMatch.id) : null;
      const nextEl = document.getElementById('bm-'+nextMatch.id);
      const svgEl  = svg;

      if (!topEl || !nextEl) continue;

      const svgRect  = svgEl.closest('.bracket-canvas').getBoundingClientRect();
      const topRect  = topEl.getBoundingClientRect();
      const nextRect = nextEl.getBoundingClientRect();

      const x1 = topRect.right  - svgRect.left;
      const y1 = topRect.top + topRect.height/2 - svgRect.top;
      const x2 = nextRect.left  - svgRect.left;
      const y2 = nextRect.top + nextRect.height/2 - svgRect.top;
      const midX = x1 + (x2-x1)*0.5;

      // Line from top match right edge → mid → next match left edge
      const path = `M${x1},${y1} L${midX},${y1} L${midX},${y2} L${x2},${y2}`;
      svg.innerHTML += `<path d="${path}" stroke="rgba(201,168,76,0.25)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;

      if (botEl) {
        const botRect = botEl.getBoundingClientRect();
        const xb1 = botRect.right - svgRect.left;
        const yb1 = botRect.top + botRect.height/2 - svgRect.top;
        const pathB = `M${xb1},${yb1} L${midX},${yb1} L${midX},${y2}`;
        svg.innerHTML += `<path d="${pathB}" stroke="rgba(201,168,76,0.25)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;
      }
    }
  }

  // Losers bracket lines
  const svgL = document.getElementById('bracket-svg-l');
  if (!svgL) return;
  svgL.innerHTML = '';
  const lRounds = buildBracketRounds('L');
  for (let r=0; r<lRounds.length-1; r++) {
    const curRound = lRounds[r];
    const nextRound = lRounds[r+1];
    for (let i=0; i<nextRound.length; i++) {
      const topMatch  = curRound[i*2];
      const botMatch  = curRound[i*2+1];
      const nextMatch = nextRound[i];
      if (!topMatch || !nextMatch) continue;
      const topEl  = document.getElementById('bm-'+topMatch.id);
      const botEl  = botMatch ? document.getElementById('bm-'+botMatch.id) : null;
      const nextEl = document.getElementById('bm-'+nextMatch.id);
      if (!topEl || !nextEl) continue;
      const svgRect  = svgL.closest('.bracket-canvas').getBoundingClientRect();
      const topRect  = topEl.getBoundingClientRect();
      const nextRect = nextEl.getBoundingClientRect();
      const x1   = topRect.right  - svgRect.left;
      const y1   = topRect.top + topRect.height/2 - svgRect.top;
      const x2   = nextRect.left  - svgRect.left;
      const y2   = nextRect.top + nextRect.height/2 - svgRect.top;
      const midX = x1 + (x2-x1)*0.5;
      svgL.innerHTML += `<path d="M${x1},${y1} L${midX},${y1} L${midX},${y2} L${x2},${y2}" stroke="rgba(224,82,82,0.25)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;
      if (botEl) {
        const botRect = botEl.getBoundingClientRect();
        const xb1 = botRect.right - svgRect.left;
        const yb1 = botRect.top + botRect.height/2 - svgRect.top;
        svgL.innerHTML += `<path d="M${xb1},${yb1} L${midX},${yb1} L${midX},${y2}" stroke="rgba(224,82,82,0.25)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;
      }
    }
  }
}

// Get round label
function roundLabel(round, totalRounds, slot) {
  if (slot==='GF') return 'Grand Final';
  if (slot==='L')  {
    if (round===totalRounds) return "LB Final";
    return `Losers R${round}`;
  }
  if (round===totalRounds) return 'Final';
  if (round===totalRounds-1) return 'Semi-Final';
  if (round===totalRounds-2) return 'Quarter-Final';
  return `Round ${round}`;
}

// Determine champion
function getBracketChampion() {
  const finals = APP.bracketMatches.filter(m=>m.status==='completed');
  if (!finals.length) return null;
  // In single elim: winner of last W round
  // In double elim: winner of GF slot
  const ct = APP.config.competitionType;
  if (ct==='double_elim') {
    const gf = APP.bracketMatches.find(m=>m.slot==='GF'&&m.status==='completed');
    if (gf&&gf.winnerId) return getBracketFullName(gf.winnerId);
    return null;
  }
  // Single elim: winner of highest round
  const maxRound = Math.max(...APP.bracketMatches.filter(m=>m.slot==='W').map(m=>m.round),0);
  const final = APP.bracketMatches.find(m=>m.round===maxRound&&m.slot==='W'&&m.status==='completed');
  if (final&&final.winnerId) return getBracketFullName(final.winnerId);
  return null;
}

// ── MAIN BRACKET RENDERER ──────────────────────────────────
function renderBracket(isGroupKO=false) {
  const ct = APP.config.competitionType;
  const isDouble = ct === 'double_elim';
  const champion = getBracketChampion();

  const wRounds = buildBracketRounds('W');
  const lRounds = isDouble ? buildBracketRounds('L') : [];
  const gfMatch = isDouble ? APP.bracketMatches.find(m=>m.slot==='GF') : null;

  const wTotal = wRounds.length;
  const lTotal = lRounds.length;

  // Summary stats
  const total = APP.bracketMatches.length;
  const played = APP.bracketMatches.filter(m=>m.status==='completed').length;
  const live   = APP.bracketMatches.filter(m=>m.status==='live').length;
  const remaining = APP.bracketMatches.filter(m=>m.status==='scheduled'&&m.entityA!=='TBD'&&m.entityB!=='TBD').length;

  // Build winners bracket HTML
  let wBracketHTML = `<div style="display:flex;align-items:flex-start;gap:0;position:relative">
    <svg id="bracket-svg-w" class="bracket-svg" width="100%" height="100%"></svg>`;

  wRounds.forEach((round, ri) => {
    const rNum = ri+1;
    const matchCount = round.length;
    const slotHeight = Math.max(80, 220 / matchCount);
    const totalH = matchCount * slotHeight + (matchCount-1) * slotHeight * 0.5;

    wBracketHTML += `<div class="bracket-round" style="min-height:${totalH+28}px">
      <div class="bracket-round-label">${roundLabel(rNum, wTotal, 'W')}</div>`;

    round.forEach((m, mi) => {
      const topPad = mi===0 ? slotHeight*0.4 : slotHeight*0.8;
      wBracketHTML += `<div style="padding-top:${topPad}px">${renderBracketMatch(m)}</div>`;
    });
    wBracketHTML += `</div>`;
  });

  // Champion column
  const champ = champion
    ? `<div class="bracket-round" style="padding-top:56px"><div class="bracket-round-label">Champion</div>
        <div style="padding-top:${Math.max(40,(wRounds[wTotal-1]||[{}]).length*20)}px">
        <div class="bracket-champion"><div class="bc-label">🏆 Champion</div><div class="bc-name">${champion}</div></div>
        </div></div>`
    : '';

  wBracketHTML += champ + `</div>`;

  // Losers bracket HTML
  let lBracketHTML = '';
  if (isDouble && lRounds.length) {
    lBracketHTML = `<div style="margin-top:28px">
      <div class="bracket-divider"><span class="bracket-divider-label">LOSERS BRACKET</span></div>
      <div style="display:flex;align-items:flex-start;gap:0;position:relative">
        <svg id="bracket-svg-l" class="bracket-svg" width="100%" height="100%"></svg>`;

    lRounds.forEach((round, ri) => {
      const rNum = ri+1;
      const matchCount = round.length;
      const slotH = Math.max(80, 180/matchCount);
      const totalH = matchCount * slotH + (matchCount-1)*slotH*0.5;
      lBracketHTML += `<div class="bracket-round" style="min-height:${totalH+28}px">
        <div class="bracket-round-label" style="color:var(--red)">${roundLabel(rNum,lTotal,'L')}</div>`;
      round.forEach((m,mi)=>{
        const topPad = mi===0 ? slotH*0.4 : slotH*0.8;
        lBracketHTML += `<div style="padding-top:${topPad}px">${renderBracketMatch(m)}</div>`;
      });
      lBracketHTML += `</div>`;
    });
    lBracketHTML += `</div>`;

    // Grand final
    if (gfMatch) {
      lBracketHTML += `<div style="margin-top:20px;display:flex;align-items:center;gap:16px">
        <div class="bracket-section-title" style="margin:0">⚔️ Grand Final</div>
        ${renderBracketMatch(gfMatch, {grandFinal:true})}
        ${champion?`<div class="bracket-champion" style="width:160px"><div class="bc-label">🏆 Champion</div><div class="bc-name">${champion}</div></div>`:''}
      </div>`;
    }

    lBracketHTML += `</div>`;
  }

  // Info panel — upcoming ready matches
  const readyMatches = APP.bracketMatches.filter(m=>
    m.status==='scheduled' && m.entityA && m.entityA!=='TBD' && m.entityB && m.entityB!=='TBD'
  );

  const upcomingRows = readyMatches.length
    ? readyMatches.map(m=>`<div class="match-card" style="margin-bottom:8px">
        <div class="match-top"><span class="badge badge-scheduled">scheduled</span>
          ${m.date?`<span style="font-size:12px;color:var(--ink-2)">📅 ${m.date}</span>`:''}
          ${m.venue&&m.venue!=='TBD'?`<span style="font-size:12px;color:var(--ink-2)">📍 ${m.venue}</span>`:''}
        </div>
        <div class="match-vs-row">
          <div class="match-names">${getBracketFullName(m.entityA)}<span class="match-vs">vs</span>${getBracketFullName(m.entityB)}</div>
          <div style="display:flex;gap:6px">
            <button class="btn btn-primary btn-xs" onclick="openBracketScoreEntry('${m.id}')">Enter score</button>
            <button class="btn btn-ghost btn-xs" onclick="openEditBracketFixture('${m.id}')">📅 Set details</button>
          </div>
        </div>
      </div>`).join('')
    : `<div style="color:var(--ink-3);font-size:13px;padding:8px 0">No matches ready to play yet.</div>`;

  const liveRows = APP.bracketMatches.filter(m=>m.status==='live').map(m=>`
    <div class="match-card live" style="margin-bottom:8px">
      <div class="match-top"><span class="badge badge-live">live</span></div>
      <div class="match-vs-row">
        <div class="match-names">${getBracketFullName(m.entityA)}<span class="match-vs">vs</span>${getBracketFullName(m.entityB)}</div>
        <div class="score-row"><div class="score-box">${m.scoreA}</div><span style="color:var(--ink-3)">–</span><div class="score-box">${m.scoreB}</div></div>
      </div>
      <div class="match-foot">
        <button class="btn btn-primary btn-xs" onclick="openBracketScoreEntry('${m.id}')">Update score</button>
      </div>
    </div>`).join('');

  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px">
    <div class="sec-title" style="margin:0">${isGroupKO?'🏆 Knockout Stage':ct==='double_elim'?'⚔️ Double Elimination':'🏆 Single Elimination'} — ${APP.config.name||''}</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-ghost btn-sm" onclick="openSeedBracket()">🎲 Seed bracket</button>
      <button class="btn btn-ghost btn-sm" onclick="openAddBracketPlayer()">+ Add player</button>
    </div>
  </div>

  <div class="summary-bar" style="margin-bottom:20px">
    <div class="summary-item"><div class="summary-val">${APP.players.length}</div><div class="summary-lbl">Players</div></div>
    <div class="summary-item"><div class="summary-val">${played}</div><div class="summary-lbl">Played</div></div>
    ${live?`<div class="summary-item"><div class="summary-val green">${live}</div><div class="summary-lbl">Live now</div></div>`:''}
    <div class="summary-item"><div class="summary-val">${remaining}</div><div class="summary-lbl">Ready to play</div></div>
    ${champion?`<div class="summary-item"><div class="summary-val gold" style="font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">🏆 ${champion}</div><div class="summary-lbl">Champion</div></div>`:''}
  </div>

  ${liveRows}

  <div class="panel" style="padding:16px 20px 20px">
    <div class="panel-title" style="margin-bottom:16px">${isDouble?'Winners Bracket':'Bracket'}</div>
    <div class="bracket-shell" id="bracket-scroll">
      <div class="bracket-canvas">
        ${wBracketHTML}
      </div>
    </div>
    ${lBracketHTML}
  </div>

  ${readyMatches.length||liveRows?`
  <div class="panel">
    <div class="panel-title" style="margin-bottom:14px">Ready to play</div>
    ${upcomingRows}
  </div>`:''}`;
}

}

async function saveBracketScore(matchId) {
  const m = APP.bracketMatches.find(x=>x.id===matchId);
  if (!m) return;
  const sa = +document.getElementById('bs-sa').value;
  const sb = +document.getElementById('bs-sb').value;
  m.scoreA = sa; m.scoreB = sb;
  m.highBreakA = +document.getElementById('bs-hba').value||0;
  m.highBreakB = +document.getElementById('bs-hbb').value||0;
  m.status = document.getElementById('bs-status').value;
  m.date = document.getElementById('bs-date').value;
  m.venue = document.getElementById('bs-venue').value.trim();

  if (m.status==='completed') {
    if (sa > sb) { m.winnerId = m.entityA; m.loserId = m.entityB; }
    else if (sb > sa) { m.winnerId = m.entityB; m.loserId = m.entityA; }
    else { m.winnerId = null; m.loserId = null; } // draw — shouldn't happen in KO
    // Auto-advance winner to next round
    advanceBracket(m);
    // Log high breaks
    if (m.highBreakA>=(APP.config.highBreakThreshold??50)) {
      const p = APP.players.find(p=>p.id===m.entityA);
      if (p && !APP.breaks.find(b=>b.matchId===matchId&&b.playerId===m.entityA)) {
        const b={id:genId(),playerId:m.entityA,playerName:p.name,score:m.highBreakA,matchId,date:m.date,venue:m.venue,frame:null};
        APP.breaks.push(b);
        await persistInLeague('breaks',b.id,b);
      }
    }
    if (m.highBreakB>=(APP.config.highBreakThreshold??50)) {
      const p = APP.players.find(p=>p.id===m.entityB);
      if (p && !APP.breaks.find(b=>b.matchId===matchId&&b.playerId===m.entityB)) {
        const b={id:genId(),playerId:m.entityB,playerName:p.name,score:m.highBreakB,matchId,date:m.date,venue:m.venue,frame:null};
        APP.breaks.push(b);
        await persistInLeague('breaks',b.id,b);
      }
    }
  }

  await persistInLeague('bracketMatches', matchId, m);
  // Persist all bracket matches (in case advance changed multiple)
  await Promise.all(APP.bracketMatches.map(bm=>persistInLeague('bracketMatches',bm.id,bm)));
  saveActiveToLocal();
  closeModal();
  toast('Score saved — bracket updated ✓');
  render();
}

function advanceBracket(completedMatch) {
  if (!completedMatch.winnerId) return;
  const {round, matchIndex, slot, winnerId, loserId} = completedMatch;
  const isDouble = APP.config.competitionType === 'double_elim';

  // Find the next winners bracket match
  const wMatches = APP.bracketMatches.filter(m=>m.slot==='W'||(m.slot!=='L'&&m.slot!=='GF'));
  const nextRound = round + 1;
  const nextMatchIdx = Math.floor(matchIndex / 2);
  const isTopSeed = matchIndex % 2 === 0; // top slot feeds entityA, bottom feeds entityB

  const nextMatch = APP.bracketMatches.find(m=>
    (m.slot===slot||(!m.slot&&slot==='W')||slot==='W') &&
    m.round===nextRound && m.matchIndex===nextMatchIdx
  );

  if (nextMatch) {
    if (isTopSeed) { if (nextMatch.entityA==='TBD') nextMatch.entityA = winnerId; }
    else           { if (nextMatch.entityB==='TBD') nextMatch.entityB = winnerId; }
    if (nextMatch.entityA && nextMatch.entityB && nextMatch.entityA!=='TBD' && nextMatch.entityB!=='TBD') {
      nextMatch.status = 'scheduled';
    }
  }

  // Double elimination: route loser to losers bracket
  if (isDouble && loserId) {
    // Find a scheduled losers bracket match with a TBD slot in round 1
    // Simple heuristic: find first LB match in next round that still has a TBD slot
    const lbMatch = APP.bracketMatches.find(m=>
      m.slot==='L' && m.round===round && m.matchIndex===nextMatchIdx &&
      (m.entityA==='TBD'||m.entityB==='TBD')
    );
    if (lbMatch) {
      if (lbMatch.entityA==='TBD') lbMatch.entityA = loserId;
      else if (lbMatch.entityB==='TBD') lbMatch.entityB = loserId;
      if (lbMatch.entityA!=='TBD'&&lbMatch.entityB!=='TBD') lbMatch.status='scheduled';
    }
  }
}

// ── SEED BRACKET ──────────────────────────────────────────
function openSeedBracket() {
  const players = APP.players;
  if (players.length < 2) { toast('Add at least 2 players first'); return; }
  // Supported sizes: 4, 8, 16
  const sizes = [4,8,16].filter(s=>s>=players.length);
  const sz = sizes[0] || 16;
  const shuffled = [...players].sort(()=>Math.random()-0.5).slice(0,sz);
  // Pad with BYEs
  while (shuffled.length < sz) shuffled.push({id:'BYE',name:'Bye'});

  // Store in window to avoid JSON serialisation inside an HTML attribute (causes SyntaxError)
  window._pendingSeeds = shuffled.map(p=>p.id);

  openModal('Seed bracket',
    `<div class="alert alert-info">
      ${players.length} players → ${sz}-player bracket (${sz-players.length>0?sz-players.length+' byes':'no byes needed'}).
      Players are randomly seeded. You can reseed multiple times before locking.
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px">
      ${shuffled.map((p,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg-raised);border-radius:var(--r);font-size:13px">
        <span style="color:var(--ink-3);font-family:monospace;font-size:11px;min-width:20px">${i+1}</span>
        <span style="font-weight:${p.id==='BYE'?400:500};color:${p.id==='BYE'?'var(--ink-3)':'var(--ink)'}">${esc(p.name)}</span>
      </div>`).join('')}
    </div>`,
    `<button class="btn btn-ghost" onclick="openSeedBracket()">🎲 Reseed</button>
     <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="commitSeedBracket(window._pendingSeeds)">Lock &amp; generate matches</button>`
  );
}

async function commitSeedBracket(playerIds) {
  const ct = APP.config.competitionType;
  const n = playerIds.length;
  const newMatches = [];

  // Generate single elim R1 matches
  for (let i=0; i<n; i+=2) {
    const m = {
      id:genId(), round:1, matchIndex:i/2, slot:'W',
      entityA:playerIds[i], entityB:playerIds[i+1],
      scoreA:0, scoreB:0, status:'scheduled',
      winnerId:null, loserId:null, date:'', venue:''
    };
    // Auto-advance byes
    if (playerIds[i]==='BYE'||playerIds[i+1]==='BYE') {
      m.status='completed';
      m.winnerId = playerIds[i]==='BYE'?playerIds[i+1]:playerIds[i];
      m.loserId  = playerIds[i]==='BYE'?playerIds[i]:playerIds[i+1];
    }
    newMatches.push(m);
  }

  // Generate subsequent rounds (winners bracket)
  const rounds = Math.log2(n);
  for (let r=2; r<=rounds; r++) {
    const prevCount = n / Math.pow(2, r-1);
    for (let i=0; i<prevCount/2; i++) {
      newMatches.push({
        id:genId(), round:r, matchIndex:i, slot:'W',
        entityA:'TBD', entityB:'TBD',
        scoreA:0, scoreB:0, status:'scheduled',
        winnerId:null, loserId:null, date:'', venue:''
      });
    }
  }

  // For double elim, generate losers bracket skeleton
  if (ct==='double_elim') {
    // LB R1: losers from WB R1
    const wbR1Count = n/2;
    for (let i=0; i<wbR1Count/2; i++) {
      newMatches.push({
        id:genId(), round:1, matchIndex:i, slot:'L',
        entityA:'TBD', entityB:'TBD',
        scoreA:0, scoreB:0, status:'scheduled',
        winnerId:null, loserId:null, date:'', venue:''
      });
    }
    // LB subsequent rounds
    const lbRounds = (rounds-1)*2 - 1;
    for (let r=2; r<=lbRounds; r++) {
      const cnt = Math.max(1, wbR1Count / Math.pow(2, Math.ceil(r/2)));
      for (let i=0; i<Math.ceil(cnt); i++) {
        newMatches.push({
          id:genId(), round:r, matchIndex:i, slot:'L',
          entityA:'TBD', entityB:'TBD',
          scoreA:0, scoreB:0, status:'scheduled',
          winnerId:null, loserId:null, date:'', venue:''
        });
      }
    }
    // Grand Final
    newMatches.push({
      id:genId(), round:1, matchIndex:0, slot:'GF',
      entityA:'TBD', entityB:'TBD',
      scoreA:0, scoreB:0, status:'scheduled',
      winnerId:null, loserId:null, date:'', venue:''
    });
  }

  APP.bracketMatches = newMatches;
  // Auto-advance byes
  newMatches.filter(m=>m.status==='completed').forEach(m=>advanceBracket(m));
  await Promise.all(newMatches.map(m=>persistInLeague('bracketMatches',m.id,m)));
  saveActiveToLocal();
  closeModal(); toast('Bracket seeded ✓'); render();
}

// Auto-extract qualifying breaks from frame score entry
async function extractAndSaveBreaks(match) {
  const threshold = APP.config.highBreakThreshold ?? 50;
  if (APP.config.trackHighBreaks === false) return;
  const newBreaks = [];

  // From match-level high breaks (if no frame details)
  const hasFd = (match.frameDetails||[]).length > 0;
  if (!hasFd) {
    const eA = APP.players.find(p=>p.id===match.entityA) || APP.teams.find(t=>t.id===match.entityA);
    const eB = APP.players.find(p=>p.id===match.entityB) || APP.teams.find(t=>t.id===match.entityB);
    if ((match.highBreakA||0) >= threshold) {
      // Check if already logged for this match
      const already = APP.breaks.find(b=>b.matchId===match.id&&b.score===match.highBreakA&&b.playerId===match.entityA);
      if (!already) newBreaks.push({id:genId(),playerId:match.entityA,playerName:eA?.name||match.entityA,score:match.highBreakA,matchId:match.id,date:match.date,venue:match.venue,frame:null});
    }
    if ((match.highBreakB||0) >= threshold) {
      const already = APP.breaks.find(b=>b.matchId===match.id&&b.score===match.highBreakB&&b.playerId===match.entityB);
      if (!already) newBreaks.push({id:genId(),playerId:match.entityB,playerName:eB?.name||match.entityB,score:match.highBreakB,matchId:match.id,date:match.date,venue:match.venue,frame:null});
    }
  }

  // From frame details — individual breaks per frame
  (match.frameDetails||[]).forEach(f=>{
    // Resolve player IDs (may be direct player or within a team)
    const pidA = f.playerA || match.entityA;
    const pidB = f.playerB || match.entityB;
    const pA = APP.players.find(p=>p.id===pidA);
    const pB = APP.players.find(p=>p.id===pidB);
    if ((f.breakA||0) >= threshold) {
      const already = APP.breaks.find(b=>b.matchId===match.id&&b.frame===f.frame&&b.playerId===pidA);
      if (!already) newBreaks.push({id:genId(),playerId:pidA,playerName:pA?.name||pidA,score:f.breakA,matchId:match.id,date:match.date,venue:match.venue,frame:f.frame});
    }
    if ((f.breakB||0) >= threshold) {
      const already = APP.breaks.find(b=>b.matchId===match.id&&b.frame===f.frame&&b.playerId===pidB);
      if (!already) newBreaks.push({id:genId(),playerId:pidB,playerName:pB?.name||pidB,score:f.breakB,matchId:match.id,date:match.date,venue:match.venue,frame:f.frame});
    }
  });

  if (!newBreaks.length) return;
  APP.breaks.push(...newBreaks);
  await Promise.all(newBreaks.map(b=>persistInLeague('breaks',b.id,b)));
}

  const f=event.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=async e=>{try{const d=JSON.parse(e.target.result);if(d.players)APP.players=d.players;if(d.teams)APP.teams=d.teams;if(d.matches)APP.matches=d.matches;if(d.bracketMatches)APP.bracketMatches=d.bracketMatches;if(d.groups)APP.groups=d.groups;if(d.groupMatches)APP.groupMatches=d.groupMatches;if(d.knockoutMatches)APP.knockoutMatches=d.knockoutMatches;if(d.breaks)APP.breaks=d.breaks;saveActiveToLocal();toast('Imported ✓');render();}catch(err){toast('Import failed');}};
  r.readAsText(f);
}
function resetLeague(){if(!confirm('Reset all data for this league?'))return;APP.players=[];APP.teams=[];APP.matches=[];APP.bracketMatches=[];APP.groups=[];APP.groupMatches=[];APP.knockoutMatches=[];APP.breaks=[];saveActiveToLocal();toast('League data reset');render();}

// ── BOOT ─────────────────────────────────────────────────
// Firebase config is real — initialise normally
initFirebase();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#04180f">
<title>Max 147 — League Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<style>
/* ── TOKENS ─────────────────────────────────────────────── */
:root {
  /* Surfaces — four steps of baize depth */
  --bg:       oklch(12% 0.04 155);   /* deepest: #04180f equiv */
  --bg-mid:   oklch(15% 0.042 155);
  --bg-card:  oklch(18% 0.044 155);
  --bg-raised:oklch(21% 0.046 155);
  --bg-hover: oklch(24% 0.046 155);

  /* Gold accent */
  --gold:     oklch(72% 0.12 82);    /* #c9a84c equiv */
  --gold-lt:  oklch(82% 0.12 82);
  --gold-dim: oklch(52% 0.10 82);
  --gold-muted:rgba(201,168,76,.11);

  /* Text — all pass 4.5:1 on --bg-card */
  --ink:   oklch(94% 0.015 82);      /* #f0ece0 — warm white */
  --ink-2: oklch(75% 0.025 82);      /* #b5ad95 — muted, 6:1 on card */
  --ink-3: oklch(58% 0.022 82);      /* raised from 6b6350 → passes 4.5:1 */

  /* Borders */
  --border:   rgba(201,168,76,.14);
  --border-2: rgba(201,168,76,.30);

  /* Semantic */
  --green:  oklch(68% 0.15 155);
  --red:    oklch(60% 0.18 25);
  --blue:   oklch(65% 0.12 240);
  --amber:  oklch(72% 0.16 75);

  /* Radii */
  --r:    7px;
  --r-lg: 12px;
  --r-xl: 18px;  /* large cards */

  /* Type scale — clear hierarchy jumps, not 1px increments */
  --text-xs:   11px;
  --text-sm:   12px;
  --text-base: 14px;
  --text-md:   16px;
  --text-lg:   20px;
  --text-xl:   26px;
  --text-2xl:  34px;

  /* Z-index scale */
  --z-sticky: 10;
  --z-dropdown: 100;
  --z-modal-bg: 1100;
  --z-modal: 1110;
  --z-toast: 1200;

  /* Emil easing curves — strong, intentional */
  --ease-out:     cubic-bezier(0.23, 1, 0.32, 1);
  --ease-in-out:  cubic-bezier(0.77, 0, 0.175, 1);
  --ease-drawer:  cubic-bezier(0.32, 0.72, 0, 1);
  --ease-spring:  cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* ── RESET ──────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}
::selection { background: var(--gold); color: #1a0f00; }
:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; border-radius: 3px; }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg-mid); }
::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition-duration: .01ms !important; animation-duration: .01ms !important; } }

/* ── SHELL ──────────────────────────────────────────────── */
.app { display: flex; flex-direction: column; min-height: 100vh; }

/* ── TOPBAR ─────────────────────────────────────────────── */
/* ── TOPBAR — two-row structure ──────────────────────────── */
.topbar {
  position: sticky; top: 0; z-index: var(--z-sticky);
  background: var(--bg);
  border-bottom: 1px solid var(--border-2);
  display: flex; flex-direction: column;
}

/* Row 1: logo + context + right actions */
.topbar-row1 {
  display: flex; align-items: center;
  padding: 0 20px; height: 52px; gap: 10px;
  flex-shrink: 0;
}

.logo {
  display: flex; align-items: center; gap: 8px;
  white-space: nowrap; cursor: pointer; text-decoration: none;
  transition: opacity .12s; flex-shrink: 0;
}
.logo:focus-visible { outline-offset: 4px; }
.logo-ball { font-size: 20px; line-height: 1; }
/* Logo wordmark — heavy tracking, two-tone */
.logo-wordmark {
  display: flex; align-items: baseline; gap: 0;
  font-size: 15px; font-weight: 800;
  letter-spacing: .06em; line-height: 1;
}
.logo-wordmark .num { color: var(--gold); }
.logo-wordmark .max { color: var(--ink); letter-spacing: .04em; }
.logo .sub {
  font-weight: 400; font-size: 11px; color: var(--ink-3);
  margin-left: 8px; letter-spacing: .02em;
  padding-left: 8px; border-left: 1px solid var(--border);
}

/* Divider between logo and breadcrumb */
.logo-sep {
  width: 1px; height: 20px; background: var(--border);
  flex-shrink: 0; margin: 0 6px;
}

.breadcrumb {
  display: flex; align-items: center; gap: 5px;
  font-size: 13px; min-width: 0; flex: 1;
}
.breadcrumb .bc-label {
  color: var(--ink-2); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
  font-weight: 600; color: var(--ink);
}
.breadcrumb .sep { color: var(--ink-3); flex-shrink: 0; }

.topbar-right {
  margin-left: auto; display: flex; align-items: center;
  gap: 8px; flex-shrink: 0;
}

/* Row 2: tab navigation */
.topbar-row2 {
  display: flex; align-items: stretch;
  border-top: 1px solid var(--border);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.topbar-row2::-webkit-scrollbar { display: none; }

.nav-btn {
  padding: 0 16px; height: 44px;
  background: none; border: none; border-bottom: 2px solid transparent;
  font-size: 13px; font-weight: 500; color: var(--ink-2);
  cursor: pointer; white-space: nowrap;
  transition: color 100ms ease, border-color 100ms ease;
  display: flex; align-items: center; gap: 5px; font-family: inherit;
  flex-shrink: 0;
}
.nav-btn:focus-visible { outline-offset: -3px; }
.nav-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

/* Firebase status dot */
.firebase-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--ink-3); transition: background .3s; flex-shrink: 0;
}
.firebase-dot.connected { background: var(--green); }
.firebase-dot.error     { background: var(--red); }

/* ── MOBILE: bottom nav replaces top tab row ─────────────── */
.bottom-nav {
  display: none; /* shown via media query */
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: var(--z-sticky);
  background: var(--bg);
  border-top: 1px solid var(--border-2);
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.bottom-nav-inner {
  display: flex; align-items: stretch; height: 56px;
}
.bnav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 3px;
  background: none; border: none; cursor: pointer;
  color: var(--ink-3); font-family: inherit;
  transition: color 100ms ease;
  font-size: 10px; font-weight: 500;
  padding: 6px 4px;
  -webkit-tap-highlight-color: transparent;
}
.bnav-btn.active { color: var(--gold); }
.bnav-btn .bnav-icon { font-size: 20px; line-height: 1; }
.bnav-btn .bnav-label { font-size: 10px; font-weight: 500; line-height: 1; }

/* ── MAIN ───────────────────────────────────────────────── */
.main { flex: 1; padding: 24px 20px; max-width: 1160px; margin: 0 auto; width: 100%; }

/* ── LEAGUE HUB ─────────────────────────────────────────── */
.hub-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
.hub-title {
  font-size: clamp(22px, 4vw, 32px); font-weight: 800;
  color: var(--ink); letter-spacing: -.03em; line-height: 1;
}
.hub-title .ball { font-size: 28px; vertical-align: -.06em; margin-right: 4px; }
.leagues-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }

/* League card — single border, no shadow duplication */
.league-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 0; cursor: pointer;
  transition: border-color 150ms var(--ease-out);
  overflow: hidden; position: relative;
}
/* Coloured left accent by competition type */
.league-card::before {
  content: ''; position: absolute; top: 0; left: 0;
  width: 3px; height: 100%;
  background: var(--lc-accent, var(--border-2));
  transition: opacity 150ms ease;
}
.league-card[data-ct="league"]::before      { background: var(--blue); }
.league-card[data-ct="single_elim"]::before { background: var(--amber); }
.league-card[data-ct="double_elim"]::before { background: var(--red); }
.league-card[data-ct="group_stage"]::before { background: var(--green); }
.league-card.active-league { border-color: var(--gold); }

.lc-top { padding: 18px 18px 14px 20px; display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.lc-name { font-size: 16px; font-weight: 700; color: var(--ink); margin-bottom: 4px; line-height: 1.25; letter-spacing: -.02em; }
.lc-meta { font-size: 12px; color: var(--ink-2); display: flex; flex-direction: column; gap: 3px; }
.lc-meta span { display: flex; align-items: center; gap: 4px; }
.lc-status { flex-shrink: 0; display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
.lc-stats {
  padding: 12px 18px 12px 20px; border-top: 1px solid var(--border);
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0;
  background: oklch(10% 0.03 155 / 0.4);
}
.lc-stat { text-align: center; padding: 4px 0; }
.lc-stat + .lc-stat { border-left: 1px solid var(--border); }
.lc-stat-val { font-size: 20px; font-weight: 800; color: var(--ink); font-variant-numeric: tabular-nums; letter-spacing: -.02em; }
.lc-stat-lbl { font-size: 10px; color: var(--ink-3); margin-top: 3px; text-transform: uppercase; letter-spacing: .04em; }
.lc-foot { padding: 10px 18px 10px 20px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.lc-open-btn { font-size: 12px; font-weight: 600; color: var(--gold); background: none; border: none; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 4px; padding: 4px 0; transition: color .12s; }
.lc-open-btn:focus-visible { outline-offset: 2px; }
.lc-actions { display: flex; gap: 2px; }

/* New competition card — inviting, not placeholder-looking */
.new-league-card {
  background: var(--gold-muted);
  border: 1px solid oklch(72% 0.12 82 / .20);
  border-radius: var(--r-lg); cursor: pointer;
  transition: border-color .15s, background .15s;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 10px; min-height: 186px; color: var(--gold-dim);
}
.new-league-card:focus-visible { outline-offset: 3px; }
.new-league-card .plus { font-size: 28px; line-height: 1; opacity: .7; }
.new-league-card .lbl { font-size: 13px; font-weight: 600; color: var(--gold-dim); letter-spacing: -.01em; }

/* ── PANELS ─────────────────────────────────────────────── */
.panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 20px; margin-bottom: 16px; }
/* Panels inside a panel inherit depth */
.panel .panel { background: var(--bg-raised); }
.panel-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
/* panel-title: readable label, not tiny uppercase eyebrow */
.panel-title { font-size: 13px; font-weight: 600; color: var(--ink-2); }
.sec-title {
  font-size: 18px; font-weight: 800; color: var(--ink);
  display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
  letter-spacing: -.03em; line-height: 1;
}
/* No universal stripe — let size & weight do the hierarchy work */

/* ── FORM ───────────────────────────────────────────────── */
.form-row { display: grid; gap: 12px; margin-bottom: 12px; }
.form-row.c2 { grid-template-columns: 1fr 1fr; }
.form-row.c3 { grid-template-columns: 1fr 1fr 1fr; }
.form-field { display: flex; flex-direction: column; gap: 5px; }
label { font-size: 12px; font-weight: 500; color: var(--ink-2); }
input, select, textarea {
  background: var(--bg-mid); border: 1px solid var(--border);
  border-radius: var(--r); color: var(--ink);
  font-size: 13px; font-family: inherit;
  padding: 8px 11px; transition: border-color .12s; width: 100%;
}
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--gold-dim); }
/* Placeholder: bumped to --ink-3 which now passes contrast */
input::placeholder { color: var(--ink-3); }
select option { background: var(--bg-mid); }
input[type=number] { -moz-appearance: textfield; font-family: 'JetBrains Mono', monospace; }
input[type=number]::-webkit-inner-spin-button { opacity: .4; }

/* ── TOGGLE ─────────────────────────────────────────────── */
.toggle-group { display: flex; background: var(--bg-mid); border: 1px solid var(--border); border-radius: var(--r); padding: 3px; gap: 2px; }
.tog {
  flex: 1; padding: 7px 10px; text-align: center;
  border-radius: calc(var(--r) - 2px); cursor: pointer;
  font-size: 13px; font-weight: 500; color: var(--ink-2);
  transition: background .12s, color .12s; user-select: none;
}
.tog:focus-visible { outline-offset: -3px; }
.tog.on { background: var(--gold); color: #1a0f00; }

/* ── BUTTONS ────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: var(--r);
  font-size: 13px; font-weight: 500; font-family: inherit;
  cursor: pointer; border: none; transition: background .12s, color .12s, opacity .12s;
  white-space: nowrap;
}
.btn-primary { background: var(--gold); color: #1a0f00; }
.btn-ghost { background: transparent; border: 1px solid var(--border-2); color: var(--ink-2); }
.btn-danger { background: rgba(224,82,82,.09); border: 1px solid rgba(224,82,82,.26); color: var(--red); }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-xs { padding: 3px 9px; font-size: 11px; }
.btn-icon { background: none; border: none; cursor: pointer; color: var(--ink-3); font-size: 15px; padding: 4px; transition: color .12s; line-height: 1; }
.btn-icon:focus-visible { outline-offset: 2px; }

/* ── BADGES ─────────────────────────────────────────────── */
/* Base badge */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; letter-spacing: .01em; }

/* STATUS badges — pill shape (rounded), softer */
.badge-active, .badge-draft, .badge-archived, .badge-closed,
.badge-scheduled, .badge-live, .badge-completed {
  border-radius: 20px;
}
.badge-active   { background: rgba(63,191,122,.13); color: var(--green); }
.badge-draft    { background: rgba(91,155,213,.13); color: var(--blue); }
.badge-archived { background: rgba(107,99,80,.18); color: var(--ink-3); }
.badge-closed   { background: rgba(107,99,80,.18); color: var(--ink-3); }

/* Hub filter toggles */
.hub-filters { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.filter-tog {
  padding:5px 12px; border-radius:20px; font-size:12px; font-weight:500;
  cursor:pointer; border:1px solid var(--border); color:var(--ink-2);
  background:transparent; transition:border-color 120ms ease, background 120ms ease, color 120ms ease, transform 100ms var(--ease-out); font-family:inherit;
}
.filter-tog:hover { border-color:var(--border-2); color:var(--ink); }
.filter-tog.on { border-color:var(--gold-dim); background:var(--gold-muted); color:var(--gold); }
.badge-scheduled{ background: rgba(91,155,213,.13); color: var(--blue); }
.badge-live     { background: rgba(63,191,122,.13); color: var(--green); }
.badge-completed{ background: rgba(201,168,76,.13); color: var(--gold); }
.badge-live::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: blink 1.3s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
.badge-individual { background: rgba(91,155,213,.1); color: var(--blue); }
.badge-team       { background: rgba(201,168,76,.1); color: var(--gold); }

/* ── TABLES ─────────────────────────────────────────────── */
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead tr { border-bottom: 1px solid var(--border-2); }
th {
  padding: 9px 12px; text-align: left;
  font-size: 11px; font-weight: 600; color: var(--ink-2);
  text-transform: uppercase; letter-spacing: .05em;
  white-space: nowrap; cursor: pointer; user-select: none;
  transition: color .1s;
}
th:hover, th.sorted { color: var(--gold); }
td { padding: 10px 12px; border-bottom: 1px solid rgba(201,168,76,.05); white-space: nowrap; }
tbody tr { transition: background .08s; }
tbody tr:hover { background: rgba(201,168,76,.04); }
.rank-cell { font-size: 17px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
.r1 { color: #FFD700; }
.r2 { color: #C0C0C0; }
.r3 { color: #CD7F32; }
.name-cell { font-weight: 600; }
.fd-pos { color: var(--green); } .fd-neg { color: var(--red); }
.pts-cell { font-size: 18px; font-weight: 800; color: var(--gold); font-family: 'JetBrains Mono', monospace; letter-spacing: -.02em; }

/* ── SUMMARY BAR (replaces stat grid hero-metric template) ─ */
.summary-bar {
  display: flex; gap: 0; margin-bottom: 22px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--r-lg); overflow: hidden;
}
.summary-item {
  flex: 1; padding: 14px 16px; border-right: 1px solid var(--border);
  min-width: 0;
}
.summary-item:last-child { border-right: none; }
.summary-item.clickable { cursor: pointer; transition: background .1s; }
.summary-val { font-size: 24px; font-weight: 800; color: var(--ink); line-height: 1; margin-bottom: 4px; font-variant-numeric: tabular-nums; letter-spacing: -.03em; }
.summary-val.gold { color: var(--gold); }
.summary-val.green { color: var(--green); }
.summary-lbl { font-size: 10px; font-weight: 500; color: var(--ink-3); text-transform: uppercase; letter-spacing: .06em; }
.summary-sub { font-size: 11px; color: var(--ink-3); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── SUB TABS ───────────────────────────────────────────── */
.sub-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.sub-tab { padding: 8px 18px; font-size: 13px; font-weight: 500; color: var(--ink-2); cursor: pointer; border-bottom: 2px solid transparent; transition: color .12s, border-color .12s; }
.sub-tab:focus-visible { outline-offset: -2px; }
.sub-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

/* ── TEAM ACCORDION ─────────────────────────────────────── */
.acc-hd {
  background: var(--bg-raised); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 13px 16px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; transition: background .1s;
}
.acc-hd:focus-visible { outline-offset: 2px; }
.acc-hd.open { border-radius: var(--r-lg) var(--r-lg) 0 0; }
.acc-name { font-weight: 600; font-size: 14px; letter-spacing: -.01em; }
.acc-meta { font-size: 12px; color: var(--ink-2); margin-top: 2px; }
.acc-body {
  background: var(--bg-card); border: 1px solid var(--border);
  border-top: none; border-radius: 0 0 var(--r-lg) var(--r-lg);
  padding: 0 16px 14px; display: none; margin-bottom: 10px;
}
.acc-body.open { display: block; }
.player-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(201,168,76,.05); font-size: 13px; }
.player-row:last-child { border-bottom: none; }
.team-accordion { margin-bottom: 0; }

/* ── MATCH CARD ─────────────────────────────────────────── */
.match-card {
  background: var(--bg-raised); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 14px 16px; margin-bottom: 10px;
  transition: border-color 120ms var(--ease-out);
  position: relative; overflow: hidden;
}
/* Live match: green left bar + subtle bg tint */
.match-card.live {
  border-color: rgba(63,191,122,.45);
  background: oklch(22% 0.06 155);
}
.match-card.live::before {
  content: ''; position: absolute; top: 0; left: 0;
  width: 3px; height: 100%; background: var(--green);
}
.match-card.needs-details { border-color: rgba(230,168,23,.3); }
.match-card.needs-details:hover { border-color: rgba(230,168,23,.55); }
.match-top { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
.match-vs-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.match-names { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 10px; letter-spacing: -.01em; }
.match-vs { font-size: 11px; font-weight: 400; color: var(--ink-3); }
.score-row { display: flex; align-items: center; gap: 8px; }
.score-box {
  background: var(--bg); border: 1px solid var(--border-2);
  border-radius: 8px; padding: 6px 16px;
  font-size: 24px; font-weight: 800; min-width: 52px; text-align: center;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: -.04em; line-height: 1;
}
.match-foot { margin-top: 10px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.hb-note { font-size: 11px; color: var(--ink-2); }
.hb-note span { color: var(--gold); font-weight: 600; }

/* ── POINT CONFIG ───────────────────────────────────────── */
.pt-row { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid rgba(201,168,76,.07); }
.pt-row:last-child { border-bottom: none; }
.pt-label { flex: 1; font-size: 13px; }
.pt-label small { display: block; font-size: 11px; color: var(--ink-3); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }
.pt-input { width: 80px; text-align: center; flex-shrink: 0; font-family: 'JetBrains Mono', monospace; font-size: 15px !important; }

/* ── MODAL ──────────────────────────────────────────────── */
.modal-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,.72);
  z-index: var(--z-modal-bg); display: flex; align-items: center; justify-content: center; padding: 20px;
}
.modal {
  background: var(--bg-card); border: 1px solid var(--border-2);
  border-radius: var(--r-lg); width: 100%; max-width: 580px;
  max-height: 92vh; overflow-y: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,.6);
  display: flex; flex-direction: column;
  z-index: var(--z-modal);
}
.modal-hd { padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg-card); z-index: 1; }
.modal-title { font-weight: 700; font-size: 15px; letter-spacing: -.01em; }
.modal-body { padding: 20px; flex: 1; }
.modal-ft { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; position: sticky; bottom: 0; background: var(--bg-card); }

/* ── ALERTS ─────────────────────────────────────────────── */
.alert { padding: 10px 14px; border-radius: var(--r); font-size: 13px; margin-bottom: 14px; display: flex; align-items: flex-start; gap: 8px; }
.alert-success { background: rgba(63,191,122,.09); border: 1px solid rgba(63,191,122,.26); color: var(--green); }
.alert-info    { background: rgba(91,155,213,.09); border: 1px solid rgba(91,155,213,.26); color: var(--blue); }
.alert-warn    { background: rgba(230,168,23,.09); border: 1px solid rgba(230,168,23,.26); color: var(--amber); }
.alert-err     { background: rgba(224,82,82,.09);  border: 1px solid rgba(224,82,82,.26);  color: var(--red); }

/* ── TOAST ──────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--bg-raised); border: 1px solid var(--border-2);
  border-radius: 24px; padding: 10px 20px;
  font-size: 13px; font-weight: 500; color: var(--ink);
  z-index: var(--z-toast); white-space: nowrap;
  transition: transform .22s cubic-bezier(.2,.8,.4,1), opacity .22s ease;
  opacity: 0;
}
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── EMPTY STATE ────────────────────────────────────────── */
.empty { text-align: center; padding: 56px 20px; color: var(--ink-3); }
.empty-icon { font-size: 40px; margin-bottom: 12px; opacity: .28; }
.empty-text { font-size: 13px; line-height: 1.6; }

/* ── FIXTURE TABLE ──────────────────────────────────────── */
.fixture-round { margin-bottom: 20px; }
/* Round title: weight + color, not uppercase eyebrow */
.fixture-round-title { font-size: 12px; font-weight: 600; color: var(--gold); margin-bottom: 8px; padding-left: 2px; }
.fixture-row {
  display: grid; grid-template-columns: 1fr auto 1fr auto;
  align-items: center; gap: 10px;
  background: var(--bg-raised); border: 1px solid var(--border);
  border-radius: var(--r); padding: 10px 14px; margin-bottom: 6px; font-size: 13px;
}
.fixture-row .hn { font-weight: 600; }
.fixture-row .an { font-weight: 600; text-align: right; }
.fixture-row .vs-badge { font-size: 10px; font-weight: 600; color: var(--ink-3); background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; }
.rr-info { background: var(--bg-raised); border: 1px solid var(--border); border-radius: var(--r); padding: 12px 14px; margin-bottom: 14px; font-size: 13px; }
.rr-info strong { color: var(--gold); }

/* ── INLINE EDITABLE FIELDS ─────────────────────────────── */
.fixture-inline-field {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; color: var(--ink-2);
  cursor: pointer; border-radius: 5px;
  padding: 2px 6px; transition: background .1s;
  border: 1px solid transparent;
}
.fixture-inline-field:focus-visible { outline-offset: 1px; }
.fixture-inline-field.missing { color: var(--amber); }

/* ── HIGH BREAKS ────────────────────────────────────────── */
.hb-list { display: flex; flex-direction: column; }
.hb-row {
  display: grid; grid-template-columns: 48px 1fr 80px 120px 80px;
  align-items: center; gap: 12px;
  padding: 12px 16px; border-bottom: 1px solid rgba(201,168,76,.06);
  transition: background .08s;
}
.hb-row:last-child { border-bottom: none; }
.hb-rank { font-size: 14px; font-weight: 700; text-align: center; }
/* Score: no glow — weight and color do the work */
.hb-score { font-size: 24px; font-weight: 800; color: var(--gold); font-variant-numeric: tabular-nums; font-family: 'JetBrains Mono', monospace; letter-spacing: -.04em; }
.hb-score.max { color: #FFD700; font-size: 32px; }
.hb-player { font-weight: 600; font-size: 13px; }
.hb-meta { font-size: 11px; color: var(--ink-3); margin-top: 2px; }
.hb-date { font-size: 11px; color: var(--ink-3); text-align: right; }
/* Badges: solid bg, no gradient */
.hb-badge-max { background: oklch(72% 0.12 82 / .22); border: 1px solid oklch(72% 0.12 82 / .4); color: var(--gold-lt); font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 5px; white-space: nowrap; }
.hb-badge-century { background: rgba(201,168,76,.12); border: 1px solid var(--border-2); color: var(--gold); font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 5px; white-space: nowrap; }
.hb-threshold-note { font-size: 12px; color: var(--ink-3); display: flex; align-items: center; gap: 6px; padding: 8px 0 16px; }

/* ── RESPONSIVE (mobile-first) ──────────────────────────── */

/* Mobile: compact topbar row 1, hide tab row, show bottom nav */
@media (max-width: 640px) {
  .topbar-row1 {
    padding: 0 14px;
    height: 48px;
  }
  .logo { font-size: 15px; }
  .logo .sub { display: none; }
  .topbar-row2 { display: none !important; } /* hidden on mobile — bottom nav used instead */
  .bottom-nav  { display: block; }
  .main { padding-bottom: calc(72px + env(safe-area-inset-bottom, 0px)); }
}

/* Desktop: show top tab row, hide bottom nav */
@media (min-width: 641px) {
  .topbar-row2 { display: flex; } /* always show on desktop */
  .bottom-nav  { display: none !important; } /* never show on desktop */
}

@media (max-width: 640px) {
  .main { padding: 14px 12px; }

  /* Hub */
  .hub-header { margin-bottom: 16px; gap: 10px; }
  .hub-title  { font-size: 18px; }
  .leagues-grid { grid-template-columns: 1fr; gap: 10px; }
  .new-league-card { min-height: 120px; }

  /* Summary bar: scroll horizontally on mobile instead of stacking */
  .summary-bar {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    flex-wrap: nowrap;
  }
  .summary-bar::-webkit-scrollbar { display: none; }
  .summary-item {
    min-width: 90px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    border-bottom: none;
  }

  /* Forms */
  .form-row.c2, .form-row.c3 { grid-template-columns: 1fr; }
  .modal { max-width: 100%; border-radius: var(--r-lg) var(--r-lg) 0 0; }
  .modal-bg { align-items: flex-end; padding: 0; }

  /* Tables: make readable via scroll */
  .tbl-wrap { -webkit-overflow-scrolling: touch; }
  td, th { padding: 9px 10px; font-size: 12px; }
  .pts-cell { font-size: 14px; }

  /* Fixtures */
  .fixture-row { grid-template-columns: 1fr; gap: 4px; }
  .match-names { font-size: 14px; }
  .score-box { font-size: 18px; padding: 4px 12px; min-width: 40px; }
  .match-foot { gap: 6px; }
  .btn-xs { padding: 5px 10px; font-size: 12px; } /* larger touch target */

  /* High breaks: hide venue column */
  .hb-row {
    grid-template-columns: 36px 1fr 56px auto;
    padding: 10px 12px;
  }
  .hb-row > :nth-child(4) { display: none; }
  .hb-score { font-size: 19px; }
  .hb-score.max { font-size: 22px; }

  /* Bracket: smaller nodes on mobile */
  .bracket-match { width: 130px; margin: 0 18px; }
  .bracket-player { padding: 6px 8px; font-size: 11px; min-height: 30px; }
  .bp-score { font-size: 12px; }
  .bracket-round-label { font-size: 10px; }
  .bracket-champion { width: 130px; margin: 0 18px; }

  /* Participants accordion */
  .acc-hd { padding: 12px 14px; }
  .acc-name { font-size: 13px; }

  /* Filter toggles wrap on mobile */
  .hub-filters { gap: 4px; }
  .filter-tog { padding: 5px 10px; font-size: 11px; }

  /* Config point rows */
  .pt-row { flex-wrap: wrap; }
  .pt-input { width: 64px; }
}

/* Mid-range: 641–900px */
@media (min-width: 641px) and (max-width: 900px) {
  .leagues-grid { grid-template-columns: 1fr 1fr; }
  .form-row.c3 { grid-template-columns: 1fr 1fr; }
}

/* Touch device hover guard — no hover states on touch */
@media (hover: hover) and (pointer: fine) {
  .logo:hover           { opacity: .8; }
  .league-card:hover    { border-color: var(--border-2); translate: 0 -1px; }
  .nav-btn:hover        { color: var(--ink); }
  .btn-primary:hover    { background: var(--gold-lt); }
  .btn-ghost:hover      { color: var(--ink); border-color: var(--gold-dim); }
  .btn-danger:hover     { background: rgba(224,82,82,.18); }
  .lc-open-btn:hover    { color: var(--gold-lt); }
  .btn-icon:hover       { color: var(--ink); }
  .tog:hover            { background: var(--bg-hover); }
  .match-card:hover     { border-color: var(--border-2); }
  .hb-row:hover         { background: rgba(201,168,76,.04); }
  .bracket-match:hover  { border-color: var(--border-2); }
  .filter-tog:hover     { border-color: var(--border-2); color: var(--ink); }
  .fixture-inline-field:hover { background: var(--bg-hover); border-color: var(--border); }
  .new-league-card:hover { border-color: var(--gold-dim); background: var(--gold-muted); color: var(--ink-2); }
  .sub-tab:hover        { color: var(--ink); }
  .acc-hd:hover         { background: var(--bg-hover); }
  .summary-item.clickable:hover { background: var(--bg-raised); }
}

/* ── MOTION (Emil principles) ───────────────────────────── */
@keyframes slideUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(12px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes modalInMobile {
  from { opacity: 0; transform: translateY(100%); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Page sections: fast, ease-out, barely noticeable */
.main > * {
  animation: slideUp 180ms var(--ease-out) both;
}

/* League cards: staggered, crisp */
.league-card, .new-league-card {
  animation: slideUp 200ms var(--ease-out) both;
}
.leagues-grid > *:nth-child(1)  { animation-delay: 0ms;  }
.leagues-grid > *:nth-child(2)  { animation-delay: 40ms; }
.leagues-grid > *:nth-child(3)  { animation-delay: 70ms; }
.leagues-grid > *:nth-child(4)  { animation-delay: 95ms; }
.leagues-grid > *:nth-child(5)  { animation-delay: 115ms;}
.leagues-grid > *:nth-child(n+6){ animation-delay: 130ms;}

/* Table rows: opacity only (no movement — they're data, not UI) */
tbody tr {
  animation: fadeIn 140ms ease both;
}
tbody tr:nth-child(1)  { animation-delay: 20ms; }
tbody tr:nth-child(2)  { animation-delay: 45ms; }
tbody tr:nth-child(3)  { animation-delay: 65ms; }
tbody tr:nth-child(4)  { animation-delay: 80ms; }
tbody tr:nth-child(5)  { animation-delay: 92ms; }
tbody tr:nth-child(n+6){ animation-delay: 100ms;}

/* High break rows: 50ms stagger, opacity only */
.hb-row { animation: fadeIn 140ms ease both; }
.hb-list > *:nth-child(1)  { animation-delay: 20ms;  }
.hb-list > *:nth-child(2)  { animation-delay: 50ms;  }
.hb-list > *:nth-child(3)  { animation-delay: 75ms;  }
.hb-list > *:nth-child(n+4){ animation-delay: 95ms;  }

/* Match cards: 30ms stagger */
.match-card { animation: slideUp 180ms var(--ease-out) both; }

/* Modal: asymmetric — enter 200ms, feels deliberate */
.modal { animation: modalIn 200ms var(--ease-out) both; }
@media (max-width: 640px) {
  .modal { animation: modalInMobile 280ms var(--ease-drawer) both; }
}

/* Button active states — 100ms, instant feedback */
.btn:active         { transform: scale(0.97); transition: transform 100ms var(--ease-out); }
.btn-icon:active    { transform: scale(0.92); transition: transform 100ms var(--ease-out); }
.league-card:active { transform: scale(0.99); transition: transform 100ms var(--ease-out); }
.filter-tog:active  { transform: scale(0.96); transition: transform 100ms var(--ease-out); }
.bnav-btn:active    { opacity: .6; transition: opacity 80ms ease; }

/* Transition refinements: specific properties, not 'all', strong curves */
.league-card     { transition: border-color 150ms var(--ease-out); }
.btn-primary     { transition: background 120ms var(--ease-out); }
.btn-ghost       { transition: color 120ms ease, border-color 120ms ease; }
.btn-danger      { transition: background 120ms var(--ease-out); }
.match-card      { transition: border-color 120ms var(--ease-out); }
.tog             { transition: background 120ms var(--ease-out), color 120ms var(--ease-out); }
.bracket-match   { transition: border-color 120ms var(--ease-out); }
.filter-tog      { transition: border-color 120ms ease, background 120ms ease, color 120ms ease; }
.nav-btn         { transition: color 100ms ease, border-color 100ms ease; }
.acc-hd          { transition: background 100ms ease; }
.sub-tab         { transition: color 100ms ease, border-color 100ms ease; }
.fixture-inline-field { transition: background 100ms ease, border-color 100ms ease; }
.lc-open-btn     { transition: color 120ms ease; }
.btn-icon        { transition: color 100ms ease; }
.summary-item.clickable { transition: background 100ms ease; }
.bnav-btn        { transition: color 100ms ease, opacity 80ms ease; }
#toast           { transition: transform 220ms var(--ease-out), opacity 180ms ease; }

/* Reduced motion: keep opacity fades, remove all movement */
@media (prefers-reduced-motion: reduce) {
  .main > *, .league-card, .new-league-card,
  .match-card, .modal, .hb-row {
    animation: fadeIn 100ms ease both !important;
  }
  tbody tr { animation: none !important; }
  .btn:active, .btn-icon:active,
  .league-card:active, .filter-tog:active { transform: none !important; }
}


/* ── GROUP STAGE ────────────────────────────────────────── */
.gs-shell { display: flex; flex-direction: column; gap: 0; }

/* Group grid — side-by-side on desktop, stacked on mobile */
.gs-groups-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
  margin-bottom: 20px;
}

.gs-group-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--r-lg); overflow: hidden;
  animation: slideUp 200ms var(--ease-out) both;
}
.gs-group-card:nth-child(1) { animation-delay: 0ms;   }
.gs-group-card:nth-child(2) { animation-delay: 50ms;  }
.gs-group-card:nth-child(3) { animation-delay: 90ms;  }
.gs-group-card:nth-child(4) { animation-delay: 120ms; }
.gs-group-card:nth-child(n+5){ animation-delay: 140ms;}

.gs-group-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px;
  background: var(--bg-raised); border-bottom: 1px solid var(--border);
}
.gs-group-name {
  font-size: 13px; font-weight: 700; color: var(--ink); letter-spacing: -.01em;
}
.gs-group-status {
  font-size: 11px; color: var(--ink-3);
}

/* Mini standings table inside each group card */
.gs-standings { width: 100%; }
.gs-standings-hd {
  display: grid; grid-template-columns: 20px 1fr 28px 28px 28px 36px 36px;
  gap: 4px; padding: 6px 14px;
  font-size: 10px; font-weight: 600; color: var(--ink-3);
  border-bottom: 1px solid var(--border);
}
.gs-standings-row {
  display: grid; grid-template-columns: 20px 1fr 28px 28px 28px 36px 36px;
  gap: 4px; padding: 8px 14px;
  font-size: 12px;
  border-bottom: 1px solid rgba(201,168,76,.05);
  align-items: center;
  transition: background 80ms ease;
}
.gs-standings-row:last-child { border-bottom: none; }
.gs-standings-row.qualified  { background: rgba(201,168,76,.07); }
.gs-standings-row.eliminated { opacity: .55; }
.gs-pos { font-size: 11px; font-weight: 700; color: var(--ink-3); text-align: center; }
.gs-pos.q { color: var(--gold); }
.gs-pname { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gs-num { text-align: center; font-variant-numeric: tabular-nums; }
.gs-pts { text-align: center; font-weight: 700; color: var(--gold); font-variant-numeric: tabular-nums; font-family: 'JetBrains Mono', monospace; }
.gs-fd  { text-align: center; font-size: 11px; }
.gs-fd.pos { color: var(--green); }
.gs-fd.neg { color: var(--red); }

/* Qualified marker */
.gs-q-marker {
  width: 3px; height: 22px; background: var(--gold);
  border-radius: 2px; flex-shrink: 0;
  display: none;
}
.gs-standings-row.qualified .gs-q-marker { display: block; }

/* Group matches section */
.gs-matches-section { margin-bottom: 20px; }
.gs-section-title {
  font-size: 13px; font-weight: 700; color: var(--ink);
  margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
}
.gs-section-title::before {
  content: ''; width: 3px; height: 14px; background: var(--gold);
  border-radius: 2px; flex-shrink: 0;
}

/* Knockout phase */
.gs-ko-section { margin-top: 8px; }
.gs-ko-banner {
  background: rgba(201,168,76,.08); border: 1px solid var(--border-2);
  border-radius: var(--r-lg); padding: 16px 18px; margin-bottom: 16px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
}
.gs-ko-banner-title { font-size: 14px; font-weight: 700; color: var(--gold); }
.gs-ko-banner-sub   { font-size: 12px; color: var(--ink-2); margin-top: 2px; }

/* Phase toggle tabs */
.gs-phase-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.gs-phase-tab {
  padding: 9px 18px; font-size: 13px; font-weight: 500;
  color: var(--ink-2); cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 100ms ease, border-color 100ms ease;
}
.gs-phase-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

/* Group match card (compact) */
.gs-match-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; gap: 10px;
  background: var(--bg-raised); border: 1px solid var(--border);
  border-radius: var(--r); margin-bottom: 6px; font-size: 13px;
  transition: border-color 120ms var(--ease-out);
  cursor: pointer;
}
.gs-match-row:hover { border-color: var(--border-2); }
.gs-match-row.live  { border-color: rgba(63,191,122,.35); }
.gs-match-row.scheduled { cursor: pointer; }
.gs-match-names { font-weight: 600; display: flex; align-items: center; gap: 8px; }
.gs-vs { font-size: 11px; color: var(--ink-3); font-weight: 400; }
.gs-score { display: flex; align-items: center; gap: 6px; }
.gs-score-box {
  background: var(--bg); border: 1px solid var(--border-2);
  border-radius: 5px; padding: 3px 10px;
  font-size: 16px; font-weight: 700; min-width: 36px; text-align: center;
  font-family: 'JetBrains Mono', monospace;
}
.gs-match-meta { font-size: 11px; color: var(--ink-3); display: flex; gap: 8px; }

/* Qualified players list */
.gs-qualifiers {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 8px; margin-bottom: 16px;
}
.gs-qualifier-card {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg-raised); border: 1px solid var(--gold-dim);
  border-radius: var(--r); padding: 10px 12px; font-size: 13px;
}
.gs-qualifier-group { font-size: 10px; font-weight: 600; color: var(--gold); }
.gs-qualifier-name  { font-weight: 600; }

/* Badge */
.badge-group_stage { background: rgba(63,191,122,.13); color: var(--green); }

@media (max-width: 640px) {
  .gs-groups-grid { grid-template-columns: 1fr; }
  .gs-standings-hd,
  .gs-standings-row { grid-template-columns: 20px 1fr 28px 28px 36px; }
  .gs-standings-hd > :nth-child(4),
  .gs-standings-row > :nth-child(4) { display: none; } /* hide Draw col */
  .gs-match-row { flex-direction: column; align-items: flex-start; gap: 6px; }
  .gs-qualifiers { grid-template-columns: 1fr 1fr; }
}

/* ── IMPORT / EXPORT ─────────────────────────────────────── */
.import-zone {
  border: 2px dashed var(--border-2);
  border-radius: var(--r-lg); padding: 32px 24px;
  text-align: center; cursor: pointer;
  transition: border-color 160ms ease, background 160ms ease;
  background: var(--bg-raised);
}
.import-zone:hover, .import-zone.drag-over {
  border-color: var(--gold-dim); background: var(--gold-muted);
}
.import-zone-icon { font-size: 36px; margin-bottom: 10px; opacity: .5; }
.import-zone-msg  { font-size: 13px; color: var(--ink-2); line-height: 1.6; }
.import-zone input[type="file"] { display: none; }

.import-preview {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--r); overflow: hidden; margin-top: 14px;
}
.import-preview-hd {
  padding: 10px 14px; background: var(--bg-raised);
  border-bottom: 1px solid var(--border);
  font-size: 12px; font-weight: 600; color: var(--ink-2);
  display: flex; align-items: center; justify-content: space-between;
}
.import-preview-row {
  display: grid; grid-template-columns: 1fr 1fr 80px;
  padding: 8px 14px; font-size: 12px;
  border-bottom: 1px solid rgba(201,168,76,.05);
  align-items: center;
}
.import-preview-row:last-child { border-bottom: none; }
.import-row-err { color: var(--red); font-size: 11px; }
.import-row-ok  { color: var(--green); font-size: 11px; }
.import-row-warn{ color: var(--amber); font-size: 11px; }

.template-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
/* ── BRACKET ────────────────────────────────────────────── */
.bracket-shell {
  overflow-x: auto; overflow-y: visible;
  padding-bottom: 20px; cursor: grab;
}
.bracket-shell:active { cursor: grabbing; }
.bracket-canvas {
  position: relative;
  min-width: max-content;
}
/* SVG connector lines */
.bracket-svg {
  position: absolute; top: 0; left: 0;
  pointer-events: none; overflow: visible;
}
/* Round column */
.bracket-round {
  display: inline-flex; flex-direction: column;
  gap: 0; vertical-align: top;
  position: relative;
}
.bracket-round-label {
  font-size: 11px; font-weight: 600; color: var(--gold);
  padding: 0 0 10px 8px; white-space: nowrap;
  height: 28px; display: flex; align-items: flex-end;
}
.bracket-slot-spacer { flex: 1; }
/* Match node */
.bracket-match {
  width: 168px; margin: 0 28px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--r); overflow: hidden;
  cursor: pointer; transition: border-color .12s;
  flex-shrink: 0;
}
.bracket-match.live   { border-color: rgba(63,191,122,.4); }
.bracket-match.done   { border-color: var(--border-2); }
.bracket-player {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 10px; gap: 6px;
  border-bottom: 1px solid rgba(201,168,76,.07);
  font-size: 12px; transition: background .08s;
  min-height: 34px;
}
.bracket-player:last-child { border-bottom: none; }
.bracket-player.winner { background: rgba(201,168,76,.09); }
.bracket-player.loser  { opacity: .5; }
.bracket-player.tbd    { color: var(--ink-3); font-style: italic; }
.bp-name { flex: 1; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bp-score {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; font-weight: 700; min-width: 20px; text-align: right;
  color: var(--ink-3);
}
.bp-score.winning { color: var(--gold); }
/* Champion node */
.bracket-champion {
  width: 168px; margin: 0 28px;
  background: rgba(201,168,76,.1); border: 1px solid var(--gold);
  border-radius: var(--r); padding: 14px 12px; text-align: center;
  flex-shrink: 0;
}
.bc-label { font-size: 10px; font-weight: 600; color: var(--gold-dim); margin-bottom: 4px; }
.bc-name  { font-size: 14px; font-weight: 700; color: var(--gold-lt); }
/* Losers bracket separator */
.bracket-divider {
  width: 100%; height: 1px;
  background: var(--border-2); margin: 20px 0 14px;
  position: relative;
}
.bracket-divider-label {
  position: absolute; top: -9px; left: 50%;
  transform: translateX(-50%);
  background: var(--bg); padding: 0 10px;
  font-size: 10px; font-weight: 600; color: var(--ink-3);
  white-space: nowrap;
}
/* Bracket section titles */
.bracket-section-title {
  font-size: 12px; font-weight: 600; color: var(--ink-2);
  margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
}
/* Grand final special */
.bracket-match.grand-final { border-color: var(--gold-dim); }
.bracket-match.grand-final .bracket-player { min-height: 38px; }
/* Score entry highlight */
.bracket-match.editable:hover { border-color: var(--gold-dim); }

/* Type badges for hub */
.badge-league      { background: rgba(91,155,213,.13); color: var(--blue); }
.badge-single_elim { background: rgba(230,168,23,.13);  color: var(--amber); }
.badge-double_elim { background: rgba(224,82,82,.13);   color: var(--red); }

/* ══════════════════════════════════════════════════════════
   AUTH STYLES
══════════════════════════════════════════════════════════ */

/* ── AUTH SCREEN (full-page) ─────────────────────────────── */
.auth-screen {
  position: fixed; inset: 0; z-index: 1000;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.auth-card {
  background: var(--bg-card); border: 1px solid var(--border-2);
  border-radius: var(--r-lg); width: 100%; max-width: 400px;
  padding: 36px 32px;
  box-shadow: 0 8px 40px rgba(0,0,0,.6);
  animation: slideUp 240ms var(--ease-out) both;
}
.auth-logo {
  text-align: center; margin-bottom: 28px;
}
.auth-logo-icon { font-size: 40px; margin-bottom: 6px; }
.auth-logo-name { font-size: 22px; font-weight: 700; color: var(--gold); letter-spacing: -.02em; }
.auth-logo-sub  { font-size: 12px; color: var(--ink-3); margin-top: 2px; }

.auth-title { font-size: 16px; font-weight: 700; color: var(--ink); margin-bottom: 6px; text-align: center; }
.auth-sub   { font-size: 13px; color: var(--ink-2); text-align: center; margin-bottom: 24px; line-height: 1.5; }

/* Provider buttons */
.auth-providers { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
.auth-provider-btn {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 16px; border-radius: var(--r);
  background: var(--bg-raised); border: 1px solid var(--border);
  color: var(--ink); font-size: 13px; font-weight: 500; font-family: inherit;
  cursor: pointer; width: 100%; text-align: left;
  transition: background 120ms ease, border-color 120ms ease, transform 100ms var(--ease-out);
}
@media (hover: hover) {
  .auth-provider-btn:hover { border-color: var(--border-2); background: var(--bg-hover); }
}
.auth-provider-btn:active { transform: scale(0.98); }
.auth-provider-icon {
  width: 32px; height: 32px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
  background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.08);
}
.auth-provider-icon svg { width: 18px; height: 18px; }
.auth-provider-btn .provider-name { flex: 1; }
.auth-provider-btn .provider-arrow { color: var(--ink-3); font-size: 12px; }

/* Divider */
.auth-divider {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 16px; color: var(--ink-3); font-size: 12px;
}
.auth-divider::before,.auth-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* Email form */
.auth-email-form { display: flex; flex-direction: column; gap: 10px; }
.auth-email-input-row { display: flex; gap: 8px; }
.auth-email-input-row input { flex: 1; }

/* OTP step */
.auth-otp-info {
  background: rgba(91,155,213,.09); border: 1px solid rgba(91,155,213,.26);
  border-radius: var(--r); padding: 12px 14px;
  font-size: 13px; color: var(--blue); margin-bottom: 14px; line-height: 1.5;
}
.auth-otp-input {
  text-align: center; font-size: 22px; font-weight: 700; letter-spacing: .15em;
  font-family: 'JetBrains Mono', monospace; padding: 12px;
}

/* View-only banner */
.auth-view-only {
  background: rgba(201,168,76,.07); border-bottom: 1px solid var(--border);
  padding: 9px 20px; display: flex; align-items: center; justify-content: space-between;
  gap: 10px; flex-wrap: wrap; font-size: 12px;
}
.auth-view-only-msg { color: var(--ink-2); display: flex; align-items: center; gap: 6px; }
.auth-view-only-msg .icon { font-size: 14px; }

/* User chip in topbar */
.user-chip {
  display: flex; align-items: center; gap: 7px;
  padding: 4px 10px 4px 5px;
  background: var(--bg-raised); border: 1px solid var(--border);
  border-radius: 24px; cursor: pointer;
  transition: border-color 120ms ease;
  text-decoration: none;
}
@media (hover: hover) { .user-chip:hover { border-color: var(--border-2); } }
.user-avatar {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--gold-muted); border: 1px solid var(--border-2);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: var(--gold); overflow: hidden;
  flex-shrink: 0;
}
.user-avatar img { width: 100%; height: 100%; object-fit: cover; }
.user-name { font-size: 12px; font-weight: 500; color: var(--ink); max-width: 100px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-role-badge { font-size: 10px; color: var(--ink-3); }

/* Role badges */
.role-super_admin    { color: var(--gold);  }
.role-competition_owner { color: var(--blue); }
.role-player         { color: var(--green); }
.role-public         { color: var(--ink-3); }

/* User menu dropdown */
.user-menu {
  position: absolute; top: 56px; right: 16px;
  background: var(--bg-card); border: 1px solid var(--border-2);
  border-radius: var(--r-lg); width: 220px;
  box-shadow: 0 8px 24px rgba(0,0,0,.5);
  z-index: var(--z-dropdown);
  animation: slideUp 160ms var(--ease-out) both;
  overflow: hidden;
}
.user-menu-header {
  padding: 14px 16px; border-bottom: 1px solid var(--border);
}
.user-menu-name  { font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 2px; }
.user-menu-email { font-size: 11px; color: var(--ink-3); }
.user-menu-role  { font-size: 11px; font-weight: 600; margin-top: 4px; }
.user-menu-item {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 16px; font-size: 13px; color: var(--ink-2);
  cursor: pointer; transition: background 80ms ease;
  border: none; background: none; width: 100%; text-align: left; font-family: inherit;
}
@media (hover: hover) { .user-menu-item:hover { background: var(--bg-raised); color: var(--ink); } }
.user-menu-item.danger { color: var(--red); }
.user-menu-sep { height: 1px; background: var(--border); }

/* Admin panel */
.admin-panel-tab { border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.user-table-row  {
  display: grid; grid-template-columns: 1fr 1fr 120px 80px;
  align-items: center; gap: 12px;
  padding: 10px 14px; border-bottom: 1px solid rgba(201,168,76,.05);
  font-size: 13px;
}
.user-table-row:hover { background: rgba(201,168,76,.04); }
.user-table-hd   {
  display: grid; grid-template-columns: 1fr 1fr 120px 80px;
  gap: 12px; padding: 8px 14px;
  font-size: 11px; font-weight: 600; color: var(--ink-2);
  border-bottom: 1px solid var(--border-2);
}

/* Loading overlay */
.auth-loading {
  position: fixed; inset: 0; z-index: 2000;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
}
.auth-loading-spinner {
  width: 36px; height: 36px; border-radius: 50%;
  border: 3px solid var(--border);
  border-top-color: var(--gold);
  animation: spin 700ms linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Lock overlay for restricted actions */
.lock-overlay {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 48px 24px; text-align: center; gap: 12px; color: var(--ink-3);
}
.lock-icon { font-size: 36px; opacity: .4; }
.lock-msg  { font-size: 13px; line-height: 1.6; }

@media (max-width: 640px) {
  .auth-card { padding: 28px 20px; }
  .user-chip .user-name { display: none; }
  .user-menu { right: 8px; }
  .user-table-row, .user-table-hd { grid-template-columns: 1fr 1fr auto; }
  .user-table-row > :last-child, .user-table-hd > :last-child { display: none; }
}

/* ══════════════════════════════════════════════════════════
   USER MANAGEMENT PAGE
══════════════════════════════════════════════════════════ */

/* Hub-level nav bar (shown on hub, not inside a competition) */
.hub-nav {
  display: flex; gap: 2px;
  border-bottom: 1px solid var(--border-2);
  padding: 0 20px;
  background: var(--bg);
}
.hub-nav-btn {
  padding: 0 18px; height: 44px;
  background: none; border: none; border-bottom: 2px solid transparent;
  font-size: 13px; font-weight: 500; color: var(--ink-2);
  cursor: pointer; white-space: nowrap; font-family: inherit;
  transition: color 100ms ease, border-color 100ms ease;
  display: flex; align-items: center; gap: 6px;
}
.hub-nav-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
@media (hover: hover) { .hub-nav-btn:hover { color: var(--ink); } }

/* User management layout */
.um-shell { display: flex; flex-direction: column; gap: 0; }

/* Search + filter bar */
.um-toolbar {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 18px; flex-wrap: wrap;
}
.um-search {
  flex: 1; min-width: 200px;
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--r); padding: 0 12px; height: 38px;
}
.um-search input {
  flex: 1; background: none; border: none; padding: 0;
  font-size: 13px; color: var(--ink);
}
.um-search input:focus { outline: none; }
.um-search-icon { color: var(--ink-3); font-size: 14px; flex-shrink: 0; }
.um-filter-tabs { display: flex; gap: 4px; }
.um-filter-tab {
  padding: 6px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 500; cursor: pointer;
  background: transparent; border: 1px solid var(--border);
  color: var(--ink-2); font-family: inherit;
  transition: all 120ms ease;
}
.um-filter-tab.active {
  background: var(--gold-muted); border-color: var(--gold-dim); color: var(--gold);
}

/* Stats row */
.um-stats {
  display: flex; gap: 0;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--r-lg); overflow: hidden; margin-bottom: 18px;
}
.um-stat {
  flex: 1; padding: 14px 18px; border-right: 1px solid var(--border);
  text-align: center;
}
.um-stat:last-child { border-right: none; }
.um-stat-val { font-size: 22px; font-weight: 700; color: var(--ink); }
.um-stat-lbl { font-size: 11px; color: var(--ink-2); margin-top: 3px; }

/* User card grid */
.um-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 12px;
}
.um-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--r-lg); overflow: hidden;
  transition: border-color 150ms var(--ease-out);
  animation: slideUp 180ms var(--ease-out) both;
}
.um-card:hover { border-color: var(--border-2); }
.um-card:nth-child(1) { animation-delay: 0ms; }
.um-card:nth-child(2) { animation-delay: 30ms; }
.um-card:nth-child(3) { animation-delay: 55ms; }
.um-card:nth-child(4) { animation-delay: 75ms; }
.um-card:nth-child(n+5) { animation-delay: 90ms; }

.um-card-top {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 16px 12px;
}
.um-avatar {
  width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
  background: var(--bg-raised); border: 1px solid var(--border-2);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: var(--gold);
  overflow: hidden;
}
.um-avatar img { width: 100%; height: 100%; object-fit: cover; }
.um-user-info { flex: 1; min-width: 0; }
.um-user-name {
  font-size: 14px; font-weight: 700; color: var(--ink);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.um-user-email {
  font-size: 11px; color: var(--ink-3); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.um-user-meta {
  font-size: 11px; color: var(--ink-3); margin-top: 3px;
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
}

/* Role pill on card */
.um-role-pill {
  padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 700;
  white-space: nowrap;
}
.um-role-super_admin    { background: rgba(201,168,76,.18); color: var(--gold); }
.um-role-competition_owner { background: rgba(91,155,213,.15); color: var(--blue); }
.um-role-player         { background: rgba(63,191,122,.13); color: var(--green); }

/* Card footer actions */
.um-card-foot {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 14px; border-top: 1px solid var(--border);
  background: rgba(0,0,0,.08);
}
.um-card-foot .spacer { flex: 1; }

/* Competition memberships inside user card */
.um-memberships {
  padding: 0 16px 12px;
  display: flex; flex-direction: column; gap: 4px;
}
.um-membership-row {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12px; color: var(--ink-2);
  padding: 5px 8px; background: var(--bg-raised);
  border-radius: var(--r);
}
.um-membership-name { font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.um-membership-role { font-size: 10px; font-weight: 600; color: var(--ink-3); margin-left: 6px; flex-shrink: 0; }
.um-no-memberships { font-size: 12px; color: var(--ink-3); padding: 4px 0; }

/* Invite modal */
.um-invite-step {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; background: var(--bg-raised);
  border-radius: var(--r); margin-bottom: 8px; font-size: 13px;
}
.um-invite-step-num {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--gold-muted); border: 1px solid var(--border-2);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: var(--gold); flex-shrink: 0;
}

/* Status dot on card */
.um-status-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.um-status-dot.active   { background: var(--green); }
.um-status-dot.inactive { background: var(--ink-3); }

@media (max-width: 640px) {
  .hub-nav { padding: 0 12px; overflow-x: auto; scrollbar-width: none; }
  .hub-nav::-webkit-scrollbar { display: none; }
  .um-grid { grid-template-columns: 1fr; }
  .um-stats { flex-wrap: wrap; }
  .um-stat  { flex: 1 1 45%; border-bottom: 1px solid var(--border); }
  .um-toolbar { gap: 8px; }
  .um-filter-tabs { overflow-x: auto; flex-wrap: nowrap; }
}
</style>

// AUTH ENGINE
// ══════════════════════════════════════════════════════════

let auth = null; // Firebase Auth instance

// ── ROLE HELPERS ──────────────────────────────────────────
// Multi-role model: a user can hold multiple roles simultaneously.
//
//  APP.auth.role       → system-level string ('super_admin' | 'player' | 'public')
//  APP.auth.memberships → per-competition roles {leagueId: {role:'owner'|'player'}}
//
// Super admin:  full access everywhere — no need to be in members subcollection
// Owner:        full control of competitions they created/were assigned to own
// Player:       can view enrolled competitions and enter their own match scores
// Public:       read-only — dashboards and high breaks only
//
// Roles are ADDITIVE. A user can be owner of competition A and player in B.
// isSuperAdmin() is the only system-level gate. Everything else checks memberships.

function isSuperAdmin()  { return APP.auth.role === 'super_admin'; }
function isLoggedIn()    { return !!APP.auth.uid; }

// Is the user a player or owner in ANY competition (i.e. has any membership)?
function isPlayer() {
  if (!isLoggedIn()) return false;
  if (isSuperAdmin()) return true;
  return Object.keys(APP.auth.memberships || {}).length > 0;
}

// Is the user an owner of ANY competition, or a super admin?
function isOwner() {
  if (isSuperAdmin()) return true;
  // Handle legacy competition_owner system role
  if (APP.auth.role === 'competition_owner') return true;
  // Check per-competition memberships
  return Object.values(APP.auth.memberships || {}).some(m => m.role === 'owner');
}

// Is the user an owner OR player in a specific competition?
function isLeagueMember(leagueId) {
  if (!leagueId) return false;
  if (isSuperAdmin()) return true;
  return !!(APP.auth.memberships[leagueId]);
}

// Does the user have OWNER access to a specific competition?
function canEditCompetition(leagueId) {
  if (isSuperAdmin()) return true;
  const mem = APP.auth.memberships[leagueId];
  return !!(mem && mem.role === 'owner');
}

// Can the user enter a score for a specific match?
// True if: super admin, competition owner, or the linked player in the match
function canEnterScore(entityA, entityB) {
  if (!APP.activeLeagueId) return false;
  if (canEditCompetition(APP.activeLeagueId)) return true;
  const mem = APP.auth.memberships[APP.activeLeagueId];
  if (!mem || mem.role !== 'player') return false;
  return mem.playerId === entityA || mem.playerId === entityB;
}

// Kept for backward compat only — access is membership-based, not level-based
const ROLES = { super_admin:4, competition_owner:3, player:2, public:1 };
function roleLevel(r) { return ROLES[r] || 1; }

// canEditCompetition, isLeagueMember, canEnterScore — defined in ROLE HELPERS above

// Can user enter scores for a match (is one of the players in it)?
function canEnterScore(matchEntityA, matchEntityB) {
  if (isSuperAdmin() || canEditCompetition(APP.activeLeagueId)) return true;
  if (!APP.activeLeagueId) return false;
  const mem = APP.auth.memberships[APP.activeLeagueId];
  if (!mem || mem.role !== 'player') return false;
  return mem.playerId === matchEntityA || mem.playerId === matchEntityB;
}

// ── AUTH STATE LISTENER ────────────────────────────────────
function initAuth() {
  auth = firebase.auth();

  auth.onAuthStateChanged(async (user) => {
    if (user) {
      APP.auth.user = user;
      APP.auth.uid  = user.uid;
      APP.auth.email= user.email;
      APP.auth.displayName = user.displayName || user.email?.split('@')[0] || 'User';
      APP.auth.photoURL = user.photoURL;
      await loadUserProfile(user.uid);
    } else {
      APP.auth = { ...APP.auth, user:null, uid:null, email:null, displayName:null,
        photoURL:null, role:'public', memberships:{}, loading:false };
    }
    APP.auth.loading = false;
    hideAuthLoading();
    if (user) hideAuthScreen();   // ← always hide auth screen when signed in
    updateAuthChrome();
    render();
    // If inside a league, re-evaluate tab visibility after auth resolves
    if (APP.view === 'league' && APP.activeLeagueId) {
      const ct = APP.config.competitionType||'league';
      const isKnockout = ct==='single_elim'||ct==='double_elim'||ct==='group_stage';
      updateNavTabVisibility(isKnockout);
    }
  });
}

async function loadUserProfile(uid) {
  if (!db) { APP.auth.role='public'; return; }
  try {
    // Force fetch from server — bypasses offline persistence cache
    const snap = await db.collection('users').doc(uid).get({ source: 'server' });
    if (snap.exists) {
      const data = snap.data();
      APP.auth.role = data.role || 'player';
    } else {
      // First sign-in: create user profile with player role
      const profile = {
        uid, email: APP.auth.email,
        displayName: APP.auth.displayName,
        role: 'player',
        createdAt: new Date().toISOString()
      };
      await db.collection('users').doc(uid).set(profile);
      APP.auth.role = 'player';
    }
  } catch(e) {
    // Server fetch failed — try cache
    try {
      const snap = await db.collection('users').doc(uid).get({ source: 'cache' });
      if (snap.exists) APP.auth.role = snap.data().role || 'player';
      else APP.auth.role = 'player';
    } catch(e2) { APP.auth.role = 'player'; }
  }

  // Load memberships SEPARATELY so a failing index doesn't reset the role
  // The collectionGroup query requires a Firestore composite index on members.uid
  // If that index isn't deployed yet it throws — role is already set above so this is safe
  try {
    const memSnap = await db.collectionGroup('members')
      .where('uid','==',uid)
      .get({ source: 'server' });
    const mems = {};
    memSnap.forEach(d => {
      const parts = d.ref.path.split('/');
      const leagueId = parts[1];
      mems[leagueId] = d.data();
    });
    APP.auth.memberships = mems;
  } catch(e) {
    // Index not deployed or offline — memberships stay empty
    // Super admins can still edit all competitions via isSuperAdmin() check
    console.warn('Could not load memberships (index may not be deployed):', e.message);
    APP.auth.memberships = APP.auth.memberships || {};
  }
}

// ── PROVIDER SIGN-IN ───────────────────────────────────────
async function signInWithProvider(providerName) {
  if (!auth) { toast('Firebase not connected'); return; }
  let provider;
  try {
    switch(providerName) {
      case 'google':    provider = new firebase.auth.GoogleAuthProvider(); break;
      case 'apple':     provider = new firebase.auth.OAuthProvider('apple.com'); break;
      case 'microsoft': provider = new firebase.auth.OAuthProvider('microsoft.com'); break;
      case 'facebook':  provider = new firebase.auth.FacebookAuthProvider(); break;
      default: return;
    }
    await auth.signInWithPopup(provider);
    hideAuthScreen();
    toast(`Signed in ✓`);
  } catch(e) {
    if (e.code === 'auth/popup-closed-by-user') return;
    toast('Sign-in failed: ' + (e.message||e.code));
  }
}

// ── EMAIL OTP ──────────────────────────────────────────────
async function sendOTP() {
  const emailEl = document.getElementById('auth-email-input');
  const email = emailEl ? emailEl.value.trim() : '';
  if (!email || !email.includes('@')) { toast('Enter a valid email'); return; }
  if (!auth) { toast('Firebase not connected'); return; }
  otpEmail = email;
  const actionCodeSettings = {
    url: window.location.href,
    handleCodeInApp: true,
  };
  try {
    await auth.sendSignInLinkToEmail(email, actionCodeSettings);
    window.localStorage.setItem('emailForSignIn', email);
    authStep = 'otp';
    renderAuthCard();
    toast('Sign-in link sent — check your inbox');
  } catch(e) {
    toast('Failed to send OTP: ' + (e.message || e.code));
  }
}

async function verifyOTP() {
  // Firebase email link sign-in — the "OTP" input is actually a backup
  // The primary flow is clicking the link in the email
  // Here we handle the case where the user has the link URL
  toast('Please click the link in your email to complete sign-in');
}

// Handle email link sign-in on page load
async function handleEmailLink() {
  if (!auth || !firebase.auth().isSignInWithEmailLink(window.location.href)) return;
  let email = window.localStorage.getItem('emailForSignIn');
  if (!email) {
    email = window.prompt('Please confirm your email address:');
  }
  if (!email) return;
  try {
    await auth.signInWithEmailLink(email, window.location.href);
    window.localStorage.removeItem('emailForSignIn');
    // Clean URL
    history.replaceState(null, '', window.location.pathname);
    toast('Signed in via email ✓');
  } catch(e) {
    toast('Email link error: ' + (e.message||e.code));
  }
}

function loadLeagueDataLocal(id) {
  const seed = SEED[id];
  const stored = (() => { try { return JSON.parse(localStorage.getItem(lsLeague(id))||'null'); } catch(e){return null;} })();
  const bseed = BRACKET_SEED[id] || {};
  const gseed = GROUP_SEED[id] || {};
  const allSeed = seed
    ? {...seed,
        bracketMatches: bseed.bracketMatches||[],
        groups:         gseed.groups||[],
        groupMatches:   gseed.groupMatches||[],
        knockoutMatches:gseed.knockoutMatches||[],
        breaks: [...(seed.breaks||[]), ...(bseed.breaks||[]), ...(gseed.breaks||[])]}
    : {players:[],teams:[],matches:[],bracketMatches:[],groups:[],groupMatches:[],knockoutMatches:[],breaks:[]};
  const src = stored || allSeed;
  APP.players         = src.players         || [];
  APP.teams           = src.teams           || [];
  APP.matches         = src.matches         || [];
  APP.bracketMatches  = src.bracketMatches  || [];
  APP.groups          = src.groups          || [];
  APP.groupMatches    = src.groupMatches    || [];
  APP.knockoutMatches = src.knockoutMatches || [];
  APP.breaks          = src.breaks          || [];
  // For knockout/group stage competitions, use specialised seed players
  if (!APP.players.length && bseed.players) APP.players = bseed.players;
  if (!APP.players.length && gseed.players) APP.players = gseed.players;
  if (!APP.groups.length  && gseed.groups)  APP.groups  = gseed.groups;
}

async function loadLeagues() {
  // Load from localStorage immediately for fast initial render
  try {
    const ls = JSON.parse(localStorage.getItem(LS_LEAGUES)||'null');
    if (ls) { APP.leagues = ls; normaliseLeagues(); }
  } catch(e) {}

  if (!db) { if (!APP.auth.loading) render(); return; }
  try {
    const snap = await db.collection(LEAGUES_COL).orderBy('createdAt','desc').get();
    if (snap.size) APP.leagues = snap.docs.map(d => ({id:d.id,...d.data()}));
  } catch(e) {}
  normaliseLeagues();
  if (!APP.auth.loading) render();
}

async function loadLeagueData(id) {
  loadLeagueDataLocal(id); // immediately populate from seed/cache
  if (!db || !fbConnected) return;
  liveUnsubs.forEach(u=>u()); liveUnsubs=[];
  try {
    const base = db.collection(LEAGUES_COL).doc(id);
    const [pSnap, tSnap, mSnap, bSnap] = await Promise.all([
      base.collection('players').get(),
      base.collection('teams').get(),
      base.collection('matches').orderBy('date').get(),
      base.collection('breaks').orderBy('score','desc').get()
    ]);
    if (pSnap.size) APP.players = pSnap.docs.map(d=>({id:d.id,...d.data()}));
    if (tSnap.size) APP.teams   = tSnap.docs.map(d=>({id:d.id,...d.data()}));
    if (mSnap.size) APP.matches = mSnap.docs.map(d=>({id:d.id,...d.data()}));
    if (bSnap.size) APP.breaks  = bSnap.docs.map(d=>({id:d.id,...d.data()}));

    const unsub = base.collection('matches')
      .where('status','in',['live','scheduled'])
      .onSnapshot(snap => {
        snap.docChanges().forEach(ch => {
          const data = {id:ch.doc.id,...ch.doc.data()};
          const idx = APP.matches.findIndex(m=>m.id===ch.doc.id);
          if (ch.type==='modified' && idx>-1) APP.matches[idx]=data;
          else if (ch.type==='added' && idx===-1) APP.matches.push(data);
          else if (ch.type==='removed' && idx>-1) APP.matches.splice(idx,1);
        });
        if (APP.view==='league') render();
      });
    liveUnsubs.push(unsub);
  } catch(e) { console.warn('Firestore league data load error',e); }
}

// ── MAX147 SESSION BRIDGE ──────────────────────────────────
async function syncMax147Session(sessionId) {
  if (!db) return null;
  try {
    const snap = await db.collection(MAX147_SESSIONS_COL).doc(sessionId).get();
    if (!snap.exists) return null;
    const s = snap.data();
    let scoreA=0,scoreB=0,highBreakA=0,highBreakB=0;
    const fd = (s.frames||[]).map((f,i)=>{
      const winA=(f.winner===1);
      if(winA)scoreA++;else scoreB++;
      if((f.highBreak1||0)>highBreakA)highBreakA=f.highBreak1||0;
      if((f.highBreak2||0)>highBreakB)highBreakB=f.highBreak2||0;
      return {frame:i+1,winnerA:winA,breakA:f.highBreak1||0,breakB:f.highBreak2||0};
    });
    return {scoreA,scoreB,highBreakA,highBreakB,frameDetails:fd};
  } catch(e){return null;}
}

// ── HTML ESCAPE — always use for user-supplied strings in innerHTML ──
// Prevents XSS: <script>, onerror=, href=javascript:, etc.
function esc(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#x27;');
}
